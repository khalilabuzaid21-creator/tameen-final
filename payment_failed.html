<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/theme-toggle.js"></script>
    <script src="js/i18n.js"></script>
    <title>فشل عملية الدفع | Payment Failed</title>
    <link id="bootstrap-css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/site-theme.css">
    <style>
        body { min-height: 100vh; margin: 0; display: flex; flex-direction: column; }
        .navbar { width: 100%; padding: 10px 0; }
        .nav-logo { height: 35px; margin-inline-end: 20px; }
        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; padding: 20px 0; }
        .card-failed { width: 100%; max-width: 480px; border-radius: var(--tree-radius-xl); padding: 40px; text-align: center; }
        .icon-box {
            width: 90px; height: 90px; background: rgba(220, 53, 69, 0.12); color: #dc3545;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 45px; margin: 0 auto 30px; animation: shake 0.5s ease-in-out;
        }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .btn-retry { padding: 15px; width: 100%; font-size: 1.1rem; text-decoration: none; display: block; }
        .btn-retry:hover { transform: translateY(-2px); color: #fff; }
    </style>
</head>
<body class="tree-site">

<button type="button" class="tree-theme-toggle" onclick="toggleTreeTheme()" aria-label="تبديل الوضع الليلي"><span class="tree-theme-toggle__glyph" aria-hidden="true"></span></button>

<nav class="navbar">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <img src="images/logo.png" class="nav-logo" alt="Tree">
        <button class="btn btn-outline-success btn-sm" data-lang-toggle onclick="toggleLang()">EN</button>
    </div>
</nav>

<div class="main-content">
    <div class="card-failed">
        <div class="icon-box">✕</div>
        <h2 class="fw-bold text-dark mb-3" data-i18n="failed.title">نعتذر</h2>
        <p class="text-muted mb-5" style="line-height: 1.8; font-size: 1.1rem; font-weight: 600;">
            <span data-i18n="failed.msg1">نعتذر، لم نتمكن من معالجة عملية الدفع باستخدام البطاقة المدخلة.</span>
            <br>
            <span data-i18n="failed.msg2">قد يكون السبب عدم كفاية الرصيد أو رفض من البنك المصدر.</span>
            <br>
            <span data-i18n="failed.msg3">يرجى المحاولة باستخدام بطاقة أخرى أو التواصل مع البنك.</span>
        </p>
        <a href="payment.html" class="btn-retry" data-i18n="failed.btn_retry">المتابعة للدفع ↺</a>
    </div>
</div>

</body>
</html>
