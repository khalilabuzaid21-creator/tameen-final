<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فشل عملية الدفع</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f4f6f8; font-family: 'Cairo', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card-failed {
            background: white; width: 100%; max-width: 480px;
            border-radius: 24px; box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            padding: 40px; text-align: center;
        }
        .icon-box {
            width: 90px; height: 90px; background: #fde8e8; color: #dc3545;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 45px; margin: 0 auto 30px; animation: shake 0.5s ease-in-out;
        }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        
        .btn-retry {
            background-color: #198754; color: white; border: none; padding: 15px;
            border-radius: 12px; font-weight: bold; width: 100%; font-size: 1.1rem;
            transition: 0.3s; text-decoration: none; display: block;
        }
        .btn-retry:hover { background-color: #146c43; color: white; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="card-failed">
        <div class="icon-box">✕</div>
        <h2 class="fw-bold text-dark mb-3">نعتذر</h2>
        <p class="text-muted mb-5" style="line-height: 1.8; font-size: 1.1rem; font-weight: 600;">
            تم رفض بطاقتك من بوابة الدفع،
            <br>
            يرجى محاولة السداد باستخدام بطاقة أخرى.
        </p>
        <a href="payment.html" class="btn-retry">المتابعة للدفع ↺</a>
    </div>

</body>
</html>
