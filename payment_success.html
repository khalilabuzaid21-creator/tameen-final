<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/theme-toggle.js"></script>
    <script src="js/i18n.js"></script>
    <title>تمت بنجاح! | Payment Success</title>
    <link id="bootstrap-css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/site-theme.css">
    <link rel="icon" type="image/png" href="https://tree.com.sa/assets/images/favicon.png">
    <style>
        body { min-height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .card-success {
            width: 100%; max-width: 480px;
            border-radius: var(--tree-radius-xl);
            padding: 44px 36px;
            text-align: center;
        }
        .icon-box {
            width: 100px; height: 100px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; margin: 0 auto 28px;
            animation: pop-in 0.5s cubic-bezier(.34,1.56,.64,1) both;
        }
        @keyframes pop-in { from { transform: scale(0.4); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .nav-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 12px 20px; display: flex; justify-content: space-between; align-items: center;
        }
        .nav-logo-text {
            font-size: 1.4rem; font-weight: 800; color: var(--tree-primary);
            text-decoration: none; font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="tree-site">

<button type="button" class="tree-theme-toggle" onclick="toggleTreeTheme()" aria-label="تبديل الوضع الليلي"><span class="tree-theme-toggle__glyph" aria-hidden="true"></span></button>

<nav class="nav-bar">
    <a href="index.html" class="nav-logo-text">tree</a>
    <button class="btn btn-outline-success btn-sm" data-lang-toggle onclick="toggleLang()">EN</button>
</nav>

<div class="card-success main-card">
    <div class="icon-box tree-icon-muted">✓</div>

    <h2 class="fw-bold mb-3" data-i18n="success.title">تم إتمام طلبك بنجاح!</h2>
    <p class="mb-4" style="line-height:1.85; font-size:1rem; color: var(--tree-text-muted);" data-i18n="success.msg">
        شكراً لاختيارك تري. سيتم إرسال تفاصيل وثيقة التأمين إلى بريدك الإلكتروني المسجل خلال الدقائق القادمة.
    </p>

    <div class="alert alert-success fw-bold py-3">
        <div style="font-size:.85rem; opacity:.75; margin-bottom:4px;" data-i18n="success.policy_num">رقم وثيقتك هو:</div>
        <div style="font-family:monospace; font-size:1.2rem; letter-spacing:.05em;" id="policyNum">TR-2024-85719</div>
    </div>

    <a href="index.html" class="btn-home btn btn-success mt-3 px-5 py-3 fw-bold" data-i18n="success.btn_home">العودة للرئيسية</a>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCtPCVee8eynRfuFHZ6if_eK-vtaMYY-iE",
        authDomain: "tameen-658e9.firebaseapp.com",
        projectId: "tameen-658e9",
        storageBucket: "tameen-658e9.firebasestorage.app",
        messagingSenderId: "292670676256",
        appId: "1:292670676256:web:3624157751cd194efe4b45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const userId = localStorage.getItem('user_id');

    if (userId) {
        db.collection("orders").doc(userId).get().then(doc => {
            if (doc.exists && doc.data().policy_number) {
                document.getElementById('policyNum').textContent = doc.data().policy_number;
            }
        });
        db.collection("requests").doc(userId).update({ currentPage: 'تم الدفع بنجاح' }).catch(() => {});
    }
</script>
</body>
</html>
