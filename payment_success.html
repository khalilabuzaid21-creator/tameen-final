<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/theme-toggle.js"></script>
    <title>تمت بنجاح!</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/site-theme.css">
    <link rel="icon" type="image/png" href="https://tree.com.sa/assets/images/favicon.png">
    <style>
        body { min-height: 100vh; margin: 0; display: flex; flex-direction: column; }
        .navbar { width: 100%; padding: 10px 0; }
        .nav-logo { height: 35px; margin-inline-end: 20px; }
        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; width: 100%; padding: 20px 0; }
        .card-success { width: 100%; max-width: 500px; border-radius: var(--tree-radius-xl); padding: 40px; text-align: center; }
        .icon-box {
            width: 100px; height: 100px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 50px; margin: 0 auto 30px; animation: pop-in 0.5s ease-out;
        }
        @keyframes pop-in { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .btn-home { padding: 12px 30px; font-weight: bold; font-size: 1rem; text-decoration: none; display: inline-block; margin-top: 20px; }
        .btn-home:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="tree-site">

<button type="button" class="tree-theme-toggle" onclick="toggleTreeTheme()" aria-label="تبديل الوضع الليلي"><span class="tree-theme-toggle__glyph" aria-hidden="true"></span></button>

<nav class="navbar">
    <div class="container-fluid">
        <img src="images/logo.png" class="nav-logo" alt="Tree">
    </div>
</nav>

<div class="main-content">
    <div class="card-success">
        <div class="icon-box">✓</div>
        <h2 class="fw-bold text-dark mb-3">تم إتمام طلبك بنجاح!</h2>
        <p class="text-muted mb-4" style="line-height: 1.8; font-size: 1.1rem;">
            شكراً لاختيارك تري. سيتم إرسال تفاصيل وثيقة التأمين إلى بريدك الإلكتروني المسجل خلال الدقائق القادمة.
        </p>
        <div class="alert alert-success fw-bold">
            رقم وثيقتك هو: <span style="font-family: monospace;">TR-2024-85719</span>
        </div>
        <a href="index.html" class="btn-home">العودة للرئيسية</a>
    </div>
</div>

</body>
</html>
