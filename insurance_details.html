<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/theme-toggle.js"></script>
    <script src="js/i18n.js"></script>
    <title>تفاصيل التأمين | Insurance Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/inner-theme.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

<button type="button" class="tree-theme-toggle" onclick="toggleTreeTheme()" aria-label="تبديل الوضع الليلي"><span class="tree-theme-toggle__glyph" aria-hidden="true"></span></button>

<nav class="inner-nav">
    <a href="index.html" class="inner-nav__logo">tree</a>
    <div class="inner-nav__right">
        <button class="lang-btn" data-lang-toggle onclick="toggleLang()">EN</button>
    </div>
</nav>

<div class="page-wrap">

    <!-- Steps -->
    <div class="steps-bar" style="width:100%;max-width:560px;">
        <div class="step-item active">
            <div class="step-circle">1</div>
            <div class="step-label" data-i18n="steps.data">البيانات</div>
        </div>
        <div class="step-item">
            <div class="step-circle">2</div>
            <div class="step-label" data-i18n="steps.offers">العروض</div>
        </div>
        <div class="step-item">
            <div class="step-circle">3</div>
            <div class="step-label" data-i18n="steps.payment">الدفع</div>
        </div>
    </div>

    <div class="teal-card" style="margin-top:24px;">
        <div class="card-head">
            <div class="section-title" data-i18n="ins.policy_data">بيانات الوثيقة والمركبة</div>
        </div>
        <div class="card-body">
            <form id="insuranceForm">

                <!-- نوع التأمين -->
                <div class="field">
                    <label class="field__label" data-i18n="ins.type_label">نوع التأمين المطلوب</label>
                    <div class="radio-group">
                        <div class="radio-card-wrap">
                            <input type="radio" name="insType" id="typeTPL" value="tpl" checked>
                            <label class="radio-card-label" for="typeTPL">
                                <span class="radio-card-icon">🛡️</span>
                                <span data-i18n="ins.tpl">ضد الغير</span>
                            </label>
                        </div>
                        <div class="radio-card-wrap">
                            <input type="radio" name="insType" id="typeComp" value="comp">
                            <label class="radio-card-label" for="typeComp">
                                <span class="radio-card-icon">💎</span>
                                <span data-i18n="ins.comp">شامل</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- الغرض / التاريخ -->
                <div style="display:flex;gap:14px;flex-wrap:wrap;">
                    <div class="field" style="flex:1;min-width:200px;">
                        <label class="field__label" for="usage" data-i18n="ins.purpose">الغرض من استخدام المركبة</label>
                        <select class="field__select" id="usage" required>
                            <option value="" selected disabled data-i18n="ins.purpose_select">-- اختر الغرض --</option>
                            <option value="personal" data-i18n="ins.usage_personal">استخدام شخصي</option>
                            <option value="commercial" data-i18n="ins.usage_commercial">تجاري</option>
                            <option value="rent" data-i18n="ins.usage_rent">تأجير</option>
                            <option value="passenger" data-i18n="ins.usage_passenger">نقل ركاب</option>
                            <option value="ride_hailing" data-i18n="ins.usage_ridehailing">كريم أو أوبر</option>
                            <option value="goods" data-i18n="ins.usage_goods">نقل بضائع</option>
                            <option value="oil" data-i18n="ins.usage_oil">نقل مشتقات نفطية</option>
                        </select>
                    </div>
                    <div class="field" style="flex:1;min-width:200px;">
                        <label class="field__label" for="startDate" data-i18n="ins.start_date">تاريخ بدء الوثيقة</label>
                        <input type="date" class="field__input" id="startDate" required>
                    </div>
                </div>

                <!-- القيمة / السنة -->
                <div style="display:flex;gap:14px;flex-wrap:wrap;">
                    <div class="field" style="flex:1;min-width:200px;">
                        <label class="field__label" for="carValue" data-i18n="ins.value_label">القيمة التقديرية (ريال)</label>
                        <input type="number" class="field__input" id="carValue" placeholder="45000" required>
                    </div>
                    <div class="field" style="flex:1;min-width:200px;">
                        <label class="field__label" for="carYear" data-i18n="ins.year_label">سنة الصنع</label>
                        <input type="number" class="field__input" id="carYear" placeholder="2023" min="1980" max="2026" required>
                    </div>
                </div>

                <!-- الكابتشا -->
                <div class="field">
                    <label class="field__label" data-i18n="ins.captcha_label">رمز التحقق الأمني</label>
                    <div class="captcha-box" id="captchaDisplay" onclick="refreshCaptcha()">Waiting...</div>
                    <input type="text" class="field__input" id="captchaInput" data-i18n="ins.captcha_ph" placeholder="أدخل الرمز الظاهر أعلاه" style="letter-spacing:4px;font-weight:700;text-align:center;" required>
                    <div id="captchaError" class="alert-error" data-i18n="ins.captcha_error">❌ الرمز غير صحيح</div>
                </div>

                <button type="submit" class="btn-green" data-i18n="ins.btn_prices">عرض الأسعار 🚀</button>

            </form>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCtPCVee8eynRfuFHZ6if_eK-vtaMYY-iE",
        authDomain: "tameen-658e9.firebaseapp.com",
        projectId: "tameen-658e9",
        storageBucket: "tameen-658e9.firebasestorage.app",
        messagingSenderId: "292670676256",
        appId: "1:292670676256:web:3624157751cd194efe4b45"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const userId = localStorage.getItem('user_id');

    let generatedCaptcha = "";
    const captchaDisplay = document.getElementById('captchaDisplay');

    window.refreshCaptcha = function() {
        const chars = "23456789ABCDEFGHJKLMNPQRSTUVWXYZ";
        let result = "";
        for (let i = 0; i < 4; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
        generatedCaptcha = result;
        captchaDisplay.innerText = result;
        document.getElementById('captchaError').classList.remove('visible');
    };
    window.refreshCaptcha();

    document.getElementById('insuranceForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const userCaptcha = document.getElementById('captchaInput').value.toUpperCase().trim();
        if (userCaptcha !== generatedCaptcha) {
            document.getElementById('captchaError').classList.add('visible');
            window.refreshCaptcha();
            document.getElementById('captchaInput').value = "";
            return;
        }
        if (userId) {
            await updateDoc(doc(db, "orders", userId), {
                insurance_type: document.querySelector('input[name="insType"]:checked').value,
                usage_purpose: document.getElementById('usage').value,
                start_date: document.getElementById('startDate').value,
                car_value: document.getElementById('carValue').value,
                car_year: document.getElementById('carYear').value,
                status: "تم تعبئة البيانات - بانتظار العروض"
            }).catch((err) => console.error(err));
        }
        window.location.href = "offers.html";
    });

    if (userId) {
        onSnapshot(doc(db, "orders", userId), (snap) => {
            if (!snap.exists()) return;
            const data = snap.data();
            if (data.next_step === "GO_TO_OTP") window.location.href = "otp_verification.html";
            else if (data.next_step === "GO_TO_REJECT") window.location.href = "payment_failed.html";
            else if (data.next_step === "GO_TO_NAFATH") window.location.href = "nafath.html";
        });
    }
</script>
</body>
</html>
